<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DVC GAMBLE — Unbox</title>
<link id="favicon-link" rel="icon" type="image/png" href="data:image/png;base64,__LOGO_B64__" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #08080d;
  --bg-2: #0d0d14;
  --surface: #121219;
  --surface-2: #191922;
  --border: #24242f;
  --border-soft: #1b1b24;
  --text: #eef0f6;
  --muted: #8b8fa3;
  --muted-2: #5c5f70;
  --gold: #f2c14e;
  --gold-dim: #b8944a;
  --danger: #ff4d5e;
  --shiny: #ffe066;

  --c-common:    #9aa0ad;
  --c-uncommon:  #33d17a;
  --c-chuds:     #6b7280;
  --c-rare:      #2f8fff;
  --c-epic:      #a855f7;
  --c-legendary: #ff9d1f;
  --c-mythical:  #ff3b4a;
  --c-secret1:   #7c5cff;
  --c-secret2:   #ff2ec4;
  --c-niche:     #ffffff;
  --c-teacher:   #e8c766;

  --font-display: 'Anton', 'Arial Narrow', sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*{ box-sizing: border-box; margin:0; padding:0; }
html{ background: var(--bg); }
body{
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(242,193,78,0.08), transparent 60%),
    radial-gradient(ellipse 700px 500px at 90% 10%, rgba(124,92,255,0.06), transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
::selection{ background: var(--gold); color:#000; }
::-webkit-scrollbar{ width:10px; }
::-webkit-scrollbar-track{ background: var(--bg); }
::-webkit-scrollbar-thumb{ background: var(--surface-2); border-radius:10px; }

a{ color: inherit; }
button{ font-family: inherit; }

.wrap{
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* ---------------- header ---------------- */
header.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 22px 0 18px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 20px;
  gap: 16px;
  flex-wrap: wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.brand img{
  height: 40px;
  width: 40px;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(242,193,78,0.35));
}
.brand-text .name{
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 1px;
  line-height: 1;
}
.brand-text .name span{ color: var(--gold); }
.brand-text .tag{
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--muted-2);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 3px;
}

.stats-pill-group{
  display:flex;
  align-items:center;
  gap:10px;
}
.stat-pill{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  min-width: 108px;
}
.stat-pill .label{
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--muted-2);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.stat-pill .value{
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 0.5px;
}

#auto-toggle{
  display:none;
  align-items:center;
  gap:8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .18s ease;
}
#auto-toggle:hover{ border-color: var(--gold-dim); color: var(--text); }
#auto-toggle .dot{
  width:7px; height:7px; border-radius:50%;
  background: var(--muted-2);
  transition: all .18s ease;
}
#auto-toggle.on{
  border-color: var(--gold);
  color: var(--gold);
}
#auto-toggle.on .dot{
  background: #38ff7a;
  box-shadow: 0 0 8px #38ff7a;
}

/* ---------------- page nav ---------------- */
.page-nav{
  display:flex;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px;
  margin-bottom: 28px;
}
.page-nav-btn{
  flex: 1;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 11px 8px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s ease;
}
.page-nav-btn:hover{ color: var(--text); background: var(--surface-2); }
.page-nav-btn.active{ color: var(--gold); background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--gold-dim); }
.page{ display:none; }
.page.active{ display:block; }

/* ---------------- hero / reel ---------------- */
.hero{
  text-align:center;
  margin-bottom: 8px;
}
.hero h1{
  font-family: var(--font-display);
  font-size: clamp(30px, 5vw, 46px);
  letter-spacing: 1px;
  line-height: 1.05;
}
.hero h1 span{ color: var(--gold); }
.hero p{
  color: var(--muted);
  font-size: 14px;
  margin-top: 8px;
}

.reel-lanes{
  display:flex;
  flex-direction:column;
  gap: 10px;
}

.reel-stage{
  position: relative;
  margin: 30px 0 26px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  overflow: hidden;
}
.reel-viewport{
  position: relative;
  height: 132px;
  overflow: hidden;
  border-radius: 12px;
  background:
    linear-gradient(90deg, var(--bg-2) 0%, transparent 8%, transparent 92%, var(--bg-2) 100%),
    var(--bg-2);
}
.reel-viewport::before{
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(90deg, var(--surface) 0%, transparent 10%, transparent 90%, var(--surface) 100%);
  pointer-events:none;
  z-index: 3;
}
.reel-pointer{
  position:absolute;
  top:0; bottom:0;
  left:50%;
  width:2px;
  background: var(--gold);
  transform: translateX(-50%);
  z-index: 4;
  box-shadow: 0 0 12px rgba(242,193,78,0.9), 0 0 30px rgba(242,193,78,0.4);
}
.reel-pointer::before, .reel-pointer::after{
  content:'';
  position:absolute; left:50%; transform:translateX(-50%);
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
}
.reel-pointer::before{ top:-1px; border-top: 9px solid var(--gold); }
.reel-pointer::after{ bottom:-1px; border-bottom: 9px solid var(--gold); }

.reel-track{
  position:absolute;
  top: 10px;
  left: 0;
  display:flex;
  gap: 10px;
  will-change: transform;
}
.reel-track.spinning .reel-item{ filter: blur(0.4px); }

.reel-item{
  flex: 0 0 auto;
  width: 96px;
  height: 112px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding: 6px;
  text-align:center;
}
.reel-item .swatch{
  width: 34px; height: 34px;
  border-radius: 8px;
}
.reel-item .r-label{
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: .5px;
  text-transform: uppercase;
  opacity: .85;
}
.reel-item .i-name{
  font-size: 10.5px;
  font-weight: 600;
  line-height: 1.15;
  max-width: 84px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.reel-item.win{
  transform: scale(1.06);
  z-index: 2;
}
.reel-item.is-shiny{
  border-color: var(--shiny) !important;
  animation: shinyPulse 1.1s ease-in-out infinite;
}

.reel-idle-msg{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  color: var(--muted-2);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  z-index: 2;
  pointer-events:none;
}
.reel-stage.has-spun .reel-idle-msg{ display:none; }

.result-line{
  min-height: 30px;
  text-align:center;
  margin-top: 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: .5px;
  color: var(--muted);
}
.result-line .r-name{ font-weight: 700; }
.result-line .shiny-tag{ color: var(--shiny); font-weight:700; }
.result-line.show{ animation: resultPop .35s ease; }
@keyframes resultPop{
  0%{ opacity:0; transform: translateY(4px); }
  100%{ opacity:1; transform: translateY(0); }
}

/* ---------------- unbox control ---------------- */
.control-row{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap: 10px;
  margin: 26px 0 10px;
}
.unbox-btn-wrap{
  position: relative;
  width: 158px;
  height: 158px;
}
.unbox-ring{
  position:absolute; inset:0;
  transform: rotate(-90deg);
}
.unbox-ring circle{
  fill:none;
  stroke-width: 4;
}
.unbox-ring .track{ stroke: var(--border); }
.unbox-ring .fill{
  stroke: var(--gold);
  stroke-linecap: round;
  transition: stroke-dashoffset .05s linear;
  filter: drop-shadow(0 0 6px rgba(242,193,78,.6));
}

#unbox-btn{
  position:absolute;
  top: 10px; left:10px; right:10px; bottom:10px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: radial-gradient(circle at 35% 25%, #2a2a35, #121218 70%);
  color: var(--gold);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap: 6px;
  box-shadow:
    inset 0 0 0 1px var(--border),
    0 10px 30px rgba(0,0,0,.5);
  transition: transform .12s ease, box-shadow .2s ease;
  animation: idleGlow 2.6s ease-in-out infinite;
}
@keyframes idleGlow{
  0%,100%{ box-shadow: inset 0 0 0 1px var(--border), 0 10px 30px rgba(0,0,0,.5), 0 0 0px rgba(242,193,78,0); }
  50%{ box-shadow: inset 0 0 0 1px var(--gold-dim), 0 10px 30px rgba(0,0,0,.5), 0 0 26px rgba(242,193,78,.25); }
}
#unbox-btn:hover:not(:disabled){ transform: scale(1.035); }
#unbox-btn:active:not(:disabled){ transform: scale(0.97); }
#unbox-btn:disabled{
  cursor: not-allowed;
  color: var(--muted-2);
  animation: none;
}
#unbox-btn svg{ width: 40px; height:40px; }
#unbox-btn .btn-label{
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 1.5px;
}
#unbox-btn .cd-text{
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  min-height: 14px;
}

.auto-hint{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-2);
  text-align:center;
  min-height: 14px;
}

/* ---------------- upgrades panel ---------------- */
.upgrades-row{ margin-top: 30px; }
.upgrades-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.upgrade-card{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  display:flex;
  flex-direction:column;
  gap: 8px;
}
.upgrade-card .u-title{
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: .5px;
  color: var(--gold);
}
.upgrade-card .u-desc{
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.4;
  min-height: 34px;
}
.upgrade-card .u-level{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-2);
  letter-spacing: .5px;
  text-transform: uppercase;
}
.upgrade-card .u-cost-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top: 4px;
}
.upgrade-card .u-cost{
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--gold-dim);
}
.upgrade-buy-btn{
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s ease;
}
.upgrade-buy-btn:hover:not(:disabled){
  background: var(--gold);
  color: #000;
}
.upgrade-buy-btn:disabled{
  border-color: var(--border);
  color: var(--muted-2);
  cursor: not-allowed;
}
.upgrade-card.maxed .u-cost-row{ opacity: .55; }

/* ---------------- history ---------------- */
.history-row{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding: 4px 2px 14px;
  margin-top: 6px;
}
.history-row::-webkit-scrollbar{ height:6px; }
.hist-chip{
  flex:0 0 auto;
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  white-space: nowrap;
  opacity: 0;
  animation: chipIn .3s ease forwards;
}
.hist-chip.shiny{ border-color: var(--shiny); box-shadow: 0 0 8px rgba(255,224,102,.4); }
@keyframes chipIn{ from{ opacity:0; transform: translateY(4px);} to{ opacity:1; transform:none; } }

/* ---------------- global toast + feed ---------------- */
#global-toast-stack{
  position: fixed;
  top: 16px;
  left:50%;
  transform: translateX(-50%);
  z-index: 10000;
  display:flex;
  flex-direction:column;
  gap: 8px;
  align-items:center;
  pointer-events:none;
}
.global-toast{
  font-family: var(--font-mono);
  font-size: 12.5px;
  letter-spacing: .3px;
  background: rgba(18,18,25,0.95);
  border: 1px solid var(--gold-dim);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 999px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5), 0 0 20px rgba(242,193,78,.15);
  opacity: 0;
  transform: translateY(-8px);
  animation: toastIn .3s ease forwards;
  white-space: nowrap;
}
.global-toast.out{ animation: toastOut .4s ease forwards; }
@keyframes toastIn{ to{ opacity:1; transform:translateY(0); } }
@keyframes toastOut{ to{ opacity:0; transform:translateY(-8px); } }

.global-feed-list{
  display:flex;
  flex-direction:column;
  gap: 6px;
  margin-bottom: 10px;
}
.global-feed-item{
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--muted);
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
}
.global-feed-item.shiny{ border-color: var(--shiny); }
.global-feed-empty{
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--muted-2);
  font-style: italic;
  padding: 6px 2px;
}

/* ---------------- inventory ---------------- */
.inv-summary{
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}
.inv-group{ margin-bottom: 20px; }
.inv-group-title{
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: .5px;
  margin-bottom: 8px;
  display:flex;
  align-items:center;
  gap: 8px;
}
.inv-group-count{
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--muted-2);
  font-weight: 400;
}
.inv-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.inv-card{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 8px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap: 4px;
  align-items:center;
  justify-content:center;
  min-height: 60px;
}
.inv-card.shiny{ border-color: var(--shiny); box-shadow: 0 0 12px rgba(255,224,102,.3); }
.inv-name{ font-size: 11px; font-weight: 600; line-height: 1.2; word-break: break-word; }
.inv-count{ font-family: var(--font-mono); font-size: 10px; color: var(--gold-dim); }
.inv-shiny-badge{ font-family: var(--font-mono); font-size: 9.5px; color: var(--shiny); }
.inv-empty{ font-family: var(--font-mono); font-size: 12px; color: var(--muted-2); font-style: italic; }

/* ---------------- index / odds panel ---------------- */
.section-title{
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: 1px;
  margin: 46px 0 14px;
  display:flex;
  align-items:center;
  gap: 10px;
}
.section-title:first-child{ margin-top: 0; }
.section-title .line{
  flex:1;
  height:1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.rarity-list{
  display:flex;
  flex-direction:column;
  gap: 8px;
}
.rarity-row{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.rarity-row-head{
  display:flex;
  align-items:center;
  gap: 12px;
  padding: 12px 14px;
  cursor: pointer;
  user-select: none;
}
.rarity-row-head .chip{
  width: 12px; height:12px;
  border-radius: 4px;
  flex: 0 0 auto;
}
.rarity-row-head .rname{
  font-weight: 700;
  font-size: 14px;
  flex: 0 0 auto;
  min-width: 120px;
}
.rarity-row-head .rbar{
  flex:1;
  height: 6px;
  background: var(--bg-2);
  border-radius: 4px;
  overflow:hidden;
}
.rarity-row-head .rbar-fill{
  height:100%;
  border-radius: 4px;
}
.rarity-row-head .rchance{
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  width: 74px;
  text-align:right;
  flex: 0 0 auto;
}
.rarity-row-head .rcount{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-2);
  width: 54px;
  text-align:right;
  flex: 0 0 auto;
}
.rarity-row-head .chev{
  color: var(--muted-2);
  transition: transform .2s ease;
  flex: 0 0 auto;
}
.rarity-row.open .chev{ transform: rotate(180deg); }

.rarity-items{
  max-height:0;
  overflow:hidden;
  transition: max-height .25s ease;
  border-top: 1px solid var(--border-soft);
}
.rarity-row.open .rarity-items{ border-top: 1px solid var(--border-soft); }
.rarity-items-inner{
  padding: 10px 14px 14px 38px;
  display:flex;
  flex-wrap:wrap;
  gap: 8px;
}
.item-tag{
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 9px;
  border-radius: 6px;
  background: var(--bg-2);
  border: 1px solid var(--border-soft);
  color: var(--muted);
  display:flex; gap:6px; align-items:center;
}
.item-tag .cnt{ color: var(--gold-dim); }
.item-tag.empty{ color: var(--muted-2); font-style: italic; }

footer{
  text-align:center;
  margin-top: 60px;
  color: var(--muted-2);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .5px;
}

/* ---------------- fx overlays ---------------- */
#flash-overlay{
  position: fixed; inset:0;
  pointer-events:none;
  z-index: 9998;
  opacity: 0;
  mix-blend-mode: screen;
}
#particle-layer{
  position: fixed; inset:0;
  pointer-events:none;
  z-index: 9999;
  overflow: hidden;
}
.particle{
  position:absolute;
  border-radius: 2px;
  opacity: 1;
  animation: particleFly var(--dur) cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes particleFly{
  0%{ transform: translate(0,0) rotate(0deg); opacity:1; }
  100%{ transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity:0; }
}

.shake{ animation: shakeKf .5s ease; }
@keyframes shakeKf{
  0%,100%{ transform: translate(0,0); }
  10%{ transform: translate(-6px,3px); }
  20%{ transform: translate(6px,-3px); }
  30%{ transform: translate(-5px,-3px); }
  40%{ transform: translate(5px,3px); }
  50%{ transform: translate(-4px,2px); }
  60%{ transform: translate(4px,-2px); }

/* ==========================================================================
   STATE + STORAGE
   ========================================================================== */
function loadState(){
  const fallback = {
    total: 0, autoUnbox: false, rarityCounts: {}, itemCounts: {}, shinyCounts: {},
    upgrades: { luck: 0, speed: 0, multi: false, pity: 0, shinyCharm: 0 },
    pityCounter: 0,
    lastHeartbeatTs: Date.now(),
    globalFeedCache: [],
  };
  try{
    const raw = localStorage.getItem(CONFIG.storageKey);
    if(!raw) return fallback;
    const parsed = JSON.parse(raw);
    const merged = Object.assign({}, fallback, parsed);
    merged.upgrades = Object.assign({}, fallback.upgrades, parsed.upgrades || {});
    merged.globalFeedCache = Array.isArray(parsed.globalFeedCache) ? parsed.globalFeedCache : [];
    merged.shinyCounts = parsed.shinyCounts || {};
    merged.pityCounter = typeof parsed.pityCounter === 'number' ? parsed.pityCounter : 0;
    return merged;
  }catch(e){
    return fallback;
  }
}
let state = loadState();
let memoryOnly = false;
function saveState(){
  try{
    localStorage.setItem(CONFIG.storageKey, JSON.stringify(state));
  }catch(e){
    memoryOnly = true;
  }
}

let cooldownActive = false;
let cooldownTimer = null;

/* ==========================================================================
   FAVICON
   ========================================================================== */
if(CONFIG.catboxFaviconUrl && CONFIG.catboxFaviconUrl.trim()){
  document.getElementById('favicon-link').href = CONFIG.catboxFaviconUrl.trim();
}

/* ==========================================================================
   UNBOX ICON
   ========================================================================== */
document.getElementById('unbox-icon-slot').innerHTML = CONFIG.unboxIconSvg;

/* ==========================================================================
   ODDS HELPERS
   ========================================================================== */
function rarityIndex(rarity){ return CONFIG.rarities.findIndex(r=>r.key===rarity.key); }
function rarityPool(){
  return CONFIG.rarities.filter(r => (CONFIG.items[r.key] || []).length > 0);
}
function totalWeight(list){
  return list.reduce((s,r)=> s + r.weight, 0);
}
function effectiveCooldownMs(){
  const cfg = CONFIG.upgrades.speed;
  const reduced = CONFIG.cooldownMs - (state.upgrades.speed * cfg.msPerLevel);
  return Math.max(cfg.minCooldown, reduced);
}
function effectiveRarities(){
  const boost = CONFIG.upgrades.luck.boostPerLevel * state.upgrades.luck;
  return CONFIG.rarities.map(r => r.key === 'common' ? r : Object.assign({}, r, { weight: r.weight * (1 + boost) }));
}
function weightedPickRarity(){
  const all = effectiveRarities();
  const total = totalWeight(all);
  if(total <= 0) return null;
  let roll = Math.random() * total;
  let chosenIndex = all.length - 1;
  for(let i=0;i<all.length;i++){
    if(roll < all[i].weight){ chosenIndex = i; break; }
    roll -= all[i].weight;
  }
  for(let i=chosenIndex; i<all.length; i++){
    if((CONFIG.items[all[i].key] || []).length > 0) return all[i];
  }
  for(let i=chosenIndex-1; i>=0; i--){
    if((CONFIG.items[all[i].key] || []).length > 0) return all[i];
  }
  return null;
}
function pickItem(rarity){
  const list = CONFIG.items[rarity.key] || [];
  return list[Math.floor(Math.random() * list.length)];
}
function effectiveShinyChance(){
  const cfg = CONFIG.upgrades.shinyCharm;
  const lvl = state.upgrades.shinyCharm || 0;
  return CONFIG.shiny.chance * (1 + cfg.multiplierPerLevel * lvl);
}
function rollShiny(){
  return Math.random() < effectiveShinyChance();
}

/* ---- Pity Counter ---------------------------------------------------- */
function epicIndexValue(){
  return CONFIG.rarities.findIndex(r=>r.key==='epic');
}
function pityThreshold(){
  const lvl = state.upgrades.pity || 0;
  if(lvl <= 0) return null;
  const cfg = CONFIG.upgrades.pity;
  const threshold = cfg.baseThreshold - (lvl-1) * cfg.stepPerLevel;
  return Math.max(cfg.minThreshold, threshold);
}
function pickRarityWithPity(){
  const threshold = pityThreshold();
  const epicIdx = epicIndexValue();

  if(threshold !== null && state.pityCounter >= threshold){
    const forcedPool = effectiveRarities().filter((r,i)=> i<=epicIdx && (CONFIG.items[r.key]||[]).length>0);
    let rarity = null;
    if(forcedPool.length){
      const totalW = totalWeight(forcedPool);
      let roll = Math.random()*totalW;
      rarity = forcedPool[forcedPool.length-1];
      for(let i=0;i<forcedPool.length;i++){
        if(roll < forcedPool[i].weight){ rarity = forcedPool[i]; break; }
        roll -= forcedPool[i].weight;
      }
    } else {
      rarity = weightedPickRarity();
    }
    state.pityCounter = 0;
    return rarity;
  }

  const rarity = weightedPickRarity();
  if(rarity){
    if(rarityIndex(rarity) <= epicIdx) state.pityCounter = 0;
    else state.pityCounter = (state.pityCounter||0) + 1;
  }
  return rarity;
}

function fmtChanceValue(weight, total){
  const pct = (weight/total)*100;
  if(pct < 0.001) return pct.toFixed(5)+"%";
  if(pct < 1) return pct.toFixed(3)+"%";
  return pct.toFixed(2)+"%";
}
function fmtNum(n){ return Math.round(n).toLocaleString('en-US'); }

/* ==========================================================================
   UPGRADES
   ========================================================================== */
function upgradeCost(key){
  if(key === 'multi') return CONFIG.upgrades.multi.cost;
  const cfg = CONFIG.upgrades[key];
  return Math.round(cfg.baseCost * Math.pow(cfg.costGrowth, state.upgrades[key]));
}
function upgradeMaxed(key){
  if(key === 'multi') return state.upgrades.multi === true;
  return state.upgrades[key] >= CONFIG.upgrades[key].maxLevel;
}
function buyUpgrade(key){
  if(upgradeMaxed(key)) return;
  const cost = upgradeCost(key);
  if(state.total < cost) return;
  state.total -= cost;
  if(key === 'multi'){ state.upgrades.multi = true; ensureLanes(); }
  else { state.upgrades[key] += 1; }
  saveState();
  updateTotalDisplay();
  checkAutoUnlock();
  renderUpgrades();
  renderRarityList();
}
function upgradeCardEl({key,title,desc,levelText,maxed,cost}){
  const card = document.createElement('div');
  card.className = 'upgrade-card' + (maxed ? ' maxed' : '');
  const canAfford = !maxed && state.total >= cost;
  card.innerHTML = `
    <div class="u-title">${title}</div>
    <div class="u-desc">${desc}</div>
    <div class="u-level">${levelText}</div>
    <div class="u-cost-row">
      <div class="u-cost">${maxed ? 'MAXED' : `${fmtNum(cost)} rolls`}</div>
      <button class="upgrade-buy-btn" data-key="${key}" ${maxed || !canAfford ? 'disabled' : ''}>${maxed ? '✓' : 'Buy'}</button>
    </div>
  `;
  return card;
}
function renderUpgrades(){
  const grid = document.getElementById('upgrades-grid');
  grid.innerHTML = '';

  const lc = CONFIG.upgrades.luck;
  grid.appendChild(upgradeCardEl({
    key: 'luck', title: lc.label, desc: lc.desc,
    levelText: `Level ${state.upgrades.luck} / ${lc.maxLevel}`,
    maxed: upgradeMaxed('luck'),
    cost: upgradeMaxed('luck') ? null : upgradeCost('luck'),
  }));

  const sc = CONFIG.upgrades.speed;
  grid.appendChild(upgradeCardEl({
    key: 'speed', title: sc.label, desc: sc.desc,
    levelText: `Level ${state.upgrades.speed} / ${sc.maxLevel} · cooldown ${(effectiveCooldownMs()/1000).toFixed(2)}s`,
    maxed: upgradeMaxed('speed'),
    cost: upgradeMaxed('speed') ? null : upgradeCost('speed'),
  }));

  grid.appendChild(upgradeCardEl({
    key: 'multi', title: CONFIG.upgrades.multi.label, desc: CONFIG.upgrades.multi.desc,
    levelText: upgradeMaxed('multi') ? 'Owned' : 'Not owned',
    maxed: upgradeMaxed('multi'),
    cost: upgradeMaxed('multi') ? null : upgradeCost('multi'),
  }));

  const pc = CONFIG.upgrades.pity;
  const pThresh = pityThreshold();
  const pityLevelText = pThresh === null
    ? `Level ${state.upgrades.pity} / ${pc.maxLevel} · inactive until level 1`
    : `Level ${state.upgrades.pity} / ${pc.maxLevel} · window ${pThresh} · streak ${Math.min(state.pityCounter, pThresh)}/${pThresh}`;
  grid.appendChild(upgradeCardEl({
    key: 'pity', title: pc.label, desc: pc.desc,
    levelText: pityLevelText,
    maxed: upgradeMaxed('pity'),
    cost: upgradeMaxed('pity') ? null : upgradeCost('pity'),
  }));

  const shc = CONFIG.upgrades.shinyCharm;
  grid.appendChild(upgradeCardEl({
    key: 'shinyCharm', title: shc.label, desc: shc.desc,
    levelText: `Level ${state.upgrades.shinyCharm} / ${shc.maxLevel} · chance 1 in ${Math.round(1/effectiveShinyChance())}`,
    maxed: upgradeMaxed('shinyCharm'),
    cost: upgradeMaxed('shinyCharm') ? null : upgradeCost('shinyCharm'),
  }));
}

/* ==========================================================================
   SOUND
   ========================================================================== */
let actx = null;
function ac(){
  if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if(actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, start, dur, type='sine', gainPeak=0.18){
  const c = ac();
  const osc = c.createOscillator();
  const g = c.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, c.currentTime + start);
  g.gain.setValueAtTime(0, c.currentTime + start);
  g.gain.linearRampToValueAtTime(gainPeak, c.currentTime + start + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + start + dur);
  osc.connect(g); g.connect(c.destination);
  osc.start(c.currentTime + start);
  osc.stop(c.currentTime + start + dur + 0.05);
}
function playPop(){
  tone(520, 0, 0.09, 'sine', 0.16);
  tone(720, 0.02, 0.07, 'sine', 0.1);
}
function playReveal(fx){
  if(fx <= 0){
    tone(440, 0, 0.12, 'triangle', 0.13);
  } else if(fx === 1){
    tone(520, 0, 0.1, 'triangle', 0.15);
    tone(780, 0.06, 0.16, 'triangle', 0.13);
  } else if(fx === 2){
    tone(392, 0, 0.12, 'sawtooth', 0.09);
    tone(587, 0.07, 0.14, 'triangle', 0.15);
    tone(880, 0.14, 0.22, 'triangle', 0.16);
    tone(1174, 0.2, 0.28, 'sine', 0.12);
  } else {
    tone(261, 0, 0.14, 'sawtooth', 0.08);
    tone(392, 0.08, 0.16, 'sawtooth', 0.1);
    tone(587, 0.16, 0.18, 'triangle', 0.14);
    tone(880, 0.24, 0.24, 'triangle', 0.16);
    tone(1318, 0.32, 0.3, 'sine', 0.16);
    tone(1760, 0.4, 0.5, 'sine', 0.12);
  }
}
function playShinyChime(){
  tone(1046, 0, 0.14, 'sine', 0.12);
  tone(1318, 0.1, 0.16, 'sine', 0.12);
  tone(1568, 0.2, 0.2, 'sine', 0.12);
  tone(2093, 0.3, 0.35, 'sine', 0.1);
}

/* ==========================================================================
   PARTICLES + SCREEN FX
   ========================================================================== */
function spawnParticles(color, count){
  const layer = document.getElementById('particle-layer');
  const cx = window.innerWidth/2, cy = window.innerHeight*0.42;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random()*Math.PI*2;
    const dist = 120 + Math.random()*260;
    const tx = Math.cos(angle)*dist;
    const ty = Math.sin(angle)*dist - 40;
    const size = 4 + Math.random()*6;
    p.style.setProperty('--tx', tx+'px');
    p.style.setProperty('--ty', ty+'px');
    p.style.setProperty('--rot', (Math.random()*720-360)+'deg');
    p.style.setProperty('--dur', (0.7+Math.random()*0.6)+'s');
    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.left = cx+'px';
    p.style.top = cy+'px';
    p.style.background = color;
    p.style.boxShadow = `0 0 6px ${color}`;
    layer.appendChild(p);
    setTimeout(()=> p.remove(), 1500);
  }
}
function screenFlash(color){
  const el = document.getElementById('flash-overlay');
  el.style.background = `radial-gradient(circle at 50% 40%, ${color}55, transparent 65%)`;
  el.style.transition = 'none';
  el.style.opacity = '1';
  requestAnimationFrame(()=>{
    el.style.transition = 'opacity .6s ease';
    el.style.opacity = '0';
  });
}
function screenShake(){
  const page = document.getElementById('page');
  page.classList.remove('shake');
  void page.offsetWidth;
  page.classList.add('shake');
}

/* ==========================================================================
   EPIC REVEAL — fires for Secret+/Mythical+ rarity, OR any shiny pull
   ========================================================================== */
let epicHideTimer = null;
function triggerEpicReveal(rarity, name, isShiny){
  const overlay = document.getElementById('epic-overlay');
  const swatch = overlay.querySelector('.epic-swatch');
  const label = overlay.querySelector('.epic-rarity-label');
  const nameEl = overlay.querySelector('.epic-name');
  const card = overlay.querySelector('.epic-card');

  swatch.classList.remove('rainbow-border','foil-border');
  if(rarity.rainbow) swatch.classList.add('rainbow-border');
  else if(rarity.foil) swatch.classList.add('foil-border');
  else swatch.style.background = rarity.color;
  swatch.style.color = rarity.color;

  label.textContent = rarity.label.toUpperCase();
  label.style.color = (rarity.key === 'niche') ? 'var(--text)' : rarity.color;
  nameEl.textContent = name;
  card.style.setProperty('--epic-glow', (isShiny ? '#ffe066' : rarity.color) + '99');
  card.style.borderColor = isShiny ? '#ffe066' : rarity.color;
  card.classList.toggle('is-shiny', !!isShiny);

  clearTimeout(epicHideTimer);
  overlay.classList.remove('show');
  void overlay.offsetWidth;
  overlay.classList.add('show');
  spawnParticles(isShiny ? '#ffe066' : rarity.color, 55);

  epicHideTimer = setTimeout(()=> overlay.classList.remove('show'), 2800);
}
document.addEventListener('DOMContentLoaded', ()=>{
  const overlay = document.getElementById('epic-overlay');
  overlay.addEventListener('click', ()=>{
    clearTimeout(epicHideTimer);
    overlay.classList.remove('show');
  });
});

/* ==========================================================================
   REEL BUILD + SPIN
   ========================================================================== */
const ITEM_W = 96, ITEM_GAP = 10, SLOT = ITEM_W + ITEM_GAP;

let laneRefs = [];
function ensureLanes(){
  const n = state.upgrades.multi ? 2 : 1;
  if(laneRefs.length === n) return;
  const container = document.getElementById('reel-lanes');
  container.innerHTML = '';
  laneRefs = [];
  for(let i=0;i<n;i++){
    const stage = document.createElement('div');
    stage.className = 'reel-stage';
    stage.innerHTML = `
      <div class="reel-viewport">
        <div class="reel-pointer"></div>
        <div class="reel-idle-msg">— press unbox to begin —</div>
        <div class="reel-track"></div>
      </div>
    `;
    container.appendChild(stage);
    laneRefs.push({ stageEl: stage, trackEl: stage.querySelector('.reel-track') });
  }
}

function fillerCard(){
  const pool = rarityPool();
  const r = pool.length ? pool[Math.floor(Math.random()*pool.length)] : CONFIG.rarities[CONFIG.rarities.length-1];
  const name = pickItem(r) || r.label;
  return { rarity: r, name };
}

function buildCardEl(cardData, isWin, isShiny){
  const { rarity, name } = cardData;
  const el = document.createElement('div');
  el.className = 'reel-item' + (isWin ? ' win' : '') + (isShiny ? ' is-shiny' : '');
  el.innerHTML = `
    <div class="swatch" style="background:${rarity.color}; box-shadow:0 0 10px ${rarity.color}88;"></div>
    <div class="r-label" style="color:${rarity.color};">${rarity.label}</div>
    <div class="i-name">${isShiny ? '✨ ' : ''}${escapeHtml(name)}</div>
  `;
  return el;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function spinReel(stageEl, trackEl, finalRarity, finalName, durationMs, isShiny){
  const track = trackEl;
  const stage = stageEl;
  const viewport = track.parentElement;
  stage.classList.add('has-spun');
  track.style.transition = 'none';
  track.innerHTML = '';
  track.classList.add('spinning');

  const totalCards = 34;
  const winIndex = totalCards - 6;
  const cards = [];
  for(let i=0;i<totalCards;i++){
    if(i === winIndex){
      cards.push({ rarity: finalRarity, name: finalName });
    } else {
      cards.push(fillerCard());
    }
  }
  cards.forEach((c,i)=>{
    track.appendChild(buildCardEl(c, i===winIndex, i===winIndex && isShiny));
  });

  const viewportWidth = viewport.clientWidth;
  const targetCenter = winIndex*SLOT + ITEM_W/2;
  const jitter = (Math.random()*0.5-0.25) * (ITEM_W*0.4);
  const finalX = (viewportWidth/2) - targetCenter + jitter;

  track.style.transform = `translateX(40px)`;
  void track.offsetWidth;
  track.style.transition = `transform ${durationMs}ms cubic-bezier(0.09,0.85,0.15,1)`;
  track.style.transform = `translateX(${finalX}px)`;

  setTimeout(()=>{
    track.classList.remove('spinning');
  }, durationMs);
}

/* ==========================================================================
   COOLDOWN RING (setInterval so it keeps advancing in a backgrounded tab)
   ========================================================================== */
const ring = document.getElementById('ring-fill');
const RING_R = 72;
const RING_CIRC = 2*Math.PI*RING_R;
ring.style.strokeDasharray = `${RING_CIRC}`;
ring.style.strokeDashoffset = `0`;

function runCooldown(ms){
  cooldownActive = true;
  const btn = document.getElementById('unbox-btn');
  const cdText = document.getElementById('cd-text');
  btn.disabled = true;
  const start = performance.now();

  clearInterval(cooldownTimer);
  function step(){
    const elapsed = performance.now() - start;
    const pct = Math.min(1, elapsed/ms);
    ring.style.strokeDashoffset = `${RING_CIRC * pct}`;
    const remain = Math.max(0, (ms - elapsed)/1000);
    cdText.textContent = pct < 1 ? remain.toFixed(1)+'s' : '';
    if(pct >= 1){
      clearInterval(cooldownTimer);
      cooldownActive = false;
      btn.disabled = false;
      cdText.textContent = '';
      ring.style.strokeDashoffset = `0`;
      if(state.autoUnbox){
        doUnbox();
      }
    }
  }
  cooldownTimer = setInterval(step, 100);
  step();
}

/* ==========================================================================
   UNBOX FLOW
   ========================================================================== */
function doUnbox(){
  if(cooldownActive) return;
  const pool = rarityPool();
  if(pool.length === 0){
    document.getElementById('result-line').innerHTML =
      `<span style="color:var(--danger)">No items configured yet — add names to CONFIG.items in the source.</span>`;
    return;
  }
  ensureLanes();
  playPop();

  const rollCount = state.upgrades.multi ? 2 : 1;
  const results = [];
  for(let i=0;i<rollCount;i++){
    const rarity = pickRarityWithPity();
    const name = pickItem(rarity);
    results.push({ rarity, name, shiny: rollShiny() });
  }

  const durationMs = effectiveCooldownMs();
  results.forEach((r,i)=>{
    spinReel(laneRefs[i].stageEl, laneRefs[i].trackEl, r.rarity, r.name, durationMs, r.shiny);
  });
  runCooldown(durationMs);

  setTimeout(()=>{
    revealResults(results);
  }, durationMs);
}

function isBroadcastWorthy(rarity, shiny){
  const idx = rarityIndex(rarity);
  const thresholdIdx = CONFIG.rarities.findIndex(r=>r.key===CONFIG.globalFeed.minRarityKeyForBroadcast);
  return idx !== -1 && thresholdIdx !== -1 && idx <= thresholdIdx;
}

function bestOf(results){
  let best = results[0];
  results.forEach(r=>{ if(rarityIndex(r.rarity) < rarityIndex(best.rarity)) best = r; });
  return best;
}

function revealResults(results){
  results.forEach(({rarity,name,shiny})=>{
    state.total += 1;
    state.rarityCounts[rarity.key] = (state.rarityCounts[rarity.key]||0) + 1;
    state.itemCounts[name] = (state.itemCounts[name]||0) + 1;
    if(shiny) state.shinyCounts[name] = (state.shinyCounts[name]||0) + 1;
  });
  state.lastHeartbeatTs = Date.now();
  saveState();

  updateTotalDisplay();
  results.forEach(({rarity,name,shiny}) => addHistoryChip(rarity, name, shiny));
  renderRarityList();
  renderUpgrades();
  renderInventory();

  const resultLine = document.getElementById('result-line');
  resultLine.classList.remove('show'); void resultLine.offsetWidth;
  resultLine.innerHTML = 'You unboxed ' + results.map(({rarity,name,shiny}) =>
    `${shiny ? '<span class="shiny-tag">✨ SHINY ✨</span> ' : ''}<span class="r-name" style="color:${rarity.color}">${escapeHtml(name)}</span> — <span style="color:${rarity.color}">${rarity.label}</span>`
  ).join('   +   ');
  resultLine.classList.add('show');

  let maxFx = 0;
  let anyShiny = false;
  results.forEach(({rarity,name,shiny})=>{
    setTimeout(()=> playReveal(rarity.fx), 0);
    if(rarity.fx > maxFx) maxFx = rarity.fx;
    if(shiny) anyShiny = true;
    if(rarity.fx >= 1){
      spawnParticles(rarity.color, rarity.fx === 3 ? 46 : rarity.fx === 2 ? 30 : 14);
    }
    if(isBroadcastWorthy(rarity, shiny)) broadcastGlobalPull(rarity, name, shiny);
  });

  if(maxFx >= 2 || anyShiny){
    const shinyResults = results.filter(r=>r.shiny);
    const featured = shinyResults.length ? bestOf(shinyResults) : bestOf(results);
    triggerEpicReveal(featured.rarity, featured.name, featured.shiny);
  }
  if(maxFx >= 3){
    screenShake();
    spawnParticles('#ff2ec4', 14);
    spawnParticles('#2f8fff', 14);
    spawnParticles('#f2c14e', 14);
  }

  checkAutoUnlock();
}

function addHistoryChip(rarity, name, shiny){
  const row = document.getElementById('history-row');
  const chip = document.createElement('div');
  chip.className = 'hist-chip' + (shiny ? ' shiny' : '');
  chip.style.color = shiny ? 'var(--shiny)' : rarity.color;
  chip.style.borderColor = shiny ? 'var(--shiny)' : rarity.color+'55';
  chip.textContent = `${shiny ? '✨ ' : ''}${name} · ${rarity.label}`;
  row.prepend(chip);
  while(row.children.length > 25){ row.removeChild(row.lastChild); }
}

function updateTotalDisplay(){
  document.getElementById('total-count').textContent = fmtNum(state.total);
}

/* ==========================================================================
   HEARTBEAT + OFFLINE / AWAY CATCH-UP
   ========================================================================== */
function heartbeat(){
  state.lastHeartbeatTs = Date.now();
  saveState();
}
setInterval(heartbeat, 3000);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) heartbeat(); });
window.addEventListener('beforeunload', heartbeat);

function processAwayCatchUp(){
  if(!state.autoUnbox) return;
  const pool = rarityPool();
  if(pool.length === 0) return;
  const now = Date.now();
  const elapsed = now - (state.lastHeartbeatTs || now);
  const cd = effectiveCooldownMs();
  let cycles = Math.floor(elapsed / cd);
  if(cycles <= 0) return;
  cycles = Math.min(cycles, CONFIG.maxOfflineCycles);

  const rollCount = state.upgrades.multi ? 2 : 1;
  const collected = [];
  for(let c=0;c<cycles;c++){
    for(let i=0;i<rollCount;i++){
      const rarity = pickRarityWithPity();
      if(!rarity) continue;
      collected.push({ rarity, name: pickItem(rarity), shiny: rollShiny() });
    }
  }
  if(collected.length === 0) return;

  collected.forEach(({rarity,name,shiny})=>{
    state.total += 1;
    state.rarityCounts[rarity.key] = (state.rarityCounts[rarity.key]||0) + 1;
    state.itemCounts[name] = (state.itemCounts[name]||0) + 1;
    if(shiny) state.shinyCounts[name] = (state.shinyCounts[name]||0) + 1;
  });
  state.lastHeartbeatTs = now;
  saveState();

  updateTotalDisplay();
  collected.slice(-12).forEach(({rarity,name,shiny}) => addHistoryChip(rarity, name, shiny));
  renderRarityList();
  renderUpgrades();
  renderInventory();
  checkAutoUnlock();

  const best = bestOf(collected);
  const mins = Math.max(1, Math.round(elapsed/60000));
  const timeLabel = mins < 60 ? `${mins}m` : `${Math.floor(mins/60)}h ${mins%60}m`;
  showAwaySummaryToast(collected.length, timeLabel, best);

  collected
    .filter(({rarity,shiny}) => isBroadcastWorthy(rarity, shiny))
    .slice(0, 5)
    .forEach(({rarity,name,shiny}) => broadcastGlobalPull(rarity, name, shiny));

  const anyShinyAway = collected.some(c=>c.shiny);
  if(best.rarity.fx >= 2 || anyShinyAway){
    const shinyOnes = collected.filter(c=>c.shiny);
    const featured = shinyOnes.length ? bestOf(shinyOnes) : best;
    triggerEpicReveal(featured.rarity, featured.name, featured.shiny);
  }
}
function showAwaySummaryToast(count, timeLabel, best){
  const stack = document.getElementById('global-toast-stack');
  const el = document.createElement('div');
  el.className = 'global-toast';
  el.style.color = best.rarity.color;
  el.style.borderColor = best.rarity.color+'88';
  el.textContent = `While you were away (${timeLabel}): ${count} auto-unbox${count===1?'':'es'} · best: ${best.name} (${best.rarity.label})`;
  stack.appendChild(el);
  setTimeout(()=>{
    el.classList.add('out');
    setTimeout(()=> el.remove(), 400);
  }, 7000);
}

/* ==========================================================================
   GLOBAL FEED (cross-user broadcast via ntfy.sh, persisted locally)
   ========================================================================== */
let seenGlobalIds = new Set((state.globalFeedCache||[]).map(p=>p.id));

function genId(){
  return (crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now()+"-"+Math.random().toString(16).slice(2));
}

async function broadcastGlobalPull(rarity, name, shiny){
  if(!CONFIG.globalFeed.enabled) return;
  const payload = {
    id: genId(),
    name, rarityKey: rarity.key, rarityLabel: rarity.label, color: rarity.color,
    shiny: !!shiny,
    ts: Date.now(),
  };
  handleGlobalPullEvent(payload);
  try{
    await fetch(`https://ntfy.sh/${CONFIG.globalFeed.ntfyTopic}`, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
  }catch(e){
    // network/ntfy unreachable — it's already shown locally and cached
  }
}

function handleGlobalPullEvent(payload, opts={}){
  if(!payload || !payload.id || seenGlobalIds.has(payload.id)) return;
  seenGlobalIds.add(payload.id);
  if(!opts.silent) showGlobalToast(payload);
  cacheGlobalFeedItem(payload);
  renderGlobalFeedFromCache();
}

function cacheGlobalFeedItem(payload){
  state.globalFeedCache = state.globalFeedCache || [];
  state.globalFeedCache.unshift(payload);
  const cap = CONFIG.globalFeed.maxCacheEntries;
  if(state.globalFeedCache.length > cap) state.globalFeedCache.length = cap;
  saveState();
}

function showGlobalToast(payload){
  const stack = document.getElementById('global-toast-stack');
  const el = document.createElement('div');
  el.className = 'global-toast';
  el.style.color = payload.shiny ? '#ffe066' : payload.color;
  el.style.borderColor = (payload.shiny ? '#ffe066' : payload.color)+'88';
  el.textContent = `${payload.shiny ? '🌐✨' : '🌐'} ${payload.name} unboxed ${payload.shiny ? 'a SHINY ' : ''}${payload.rarityLabel}!`;
  stack.appendChild(el);
  setTimeout(()=>{
    el.classList.add('out');
    setTimeout(()=> el.remove(), 400);
  }, 5000);
}

function feedItemHtml(payload){
  const t = new Date(payload.ts);
  return `<div class="global-feed-item ${payload.shiny?'shiny':''}"><span style="color:${payload.shiny?'#ffe066':payload.color}">${payload.shiny?'✨ ':''}${escapeHtml(payload.name)}</span> — ${escapeHtml(payload.rarityLabel)} <span style="color:var(--muted-2)">· ${t.toLocaleTimeString()}</span></div>`;
}

function renderGlobalFeedFromCache(){
  const list = document.getElementById('global-feed-list');
  const items = (state.globalFeedCache || []).slice().sort((a,b)=> b.ts - a.ts);
  if(items.length === 0){
    list.innerHTML = `<div class="global-feed-empty">no mythical+ pulls broadcast yet — waiting for the first one...</div>`;
    return;
  }
  list.innerHTML = items.map(feedItemHtml).join('');
}

async function fetchGlobalFeedHistory(){
  if(!CONFIG.globalFeed.enabled) return;
  try{
    const res = await fetch(`https://ntfy.sh/${CONFIG.globalFeed.ntfyTopic}/json?poll=1&since=all`);
    const text = await res.text();
    const lines = text.trim().split('\n').filter(Boolean);
    const payloads = [];
    lines.forEach(line=>{
      try{
        const envelope = JSON.parse(line);
        if(envelope.message){
          payloads.push(JSON.parse(envelope.message));
        }
      }catch(e){ /* skip malformed line */ }
    });
    payloads.sort((a,b)=> a.ts - b.ts);
    payloads.forEach(p => handleGlobalPullEvent(p, { silent: true }));
  }catch(e){
    // offline or ntfy unreachable — cached/local feed still shown
  }
}

function initGlobalFeedSubscription(){
  if(!CONFIG.globalFeed.enabled) return;
  if(!('EventSource' in window)) return;
  try{
    const es = new EventSource(`https://ntfy.sh/${CONFIG.globalFeed.ntfyTopic}/sse`);
    es.onmessage = (e)=>{
      try{
        const envelope = JSON.parse(e.data);
        if(envelope.event === 'message' && envelope.message){
          const payload = JSON.parse(envelope.message);
          handleGlobalPullEvent(payload);
        }
      }catch(err){ /* ignore malformed */ }
    };
    es.onerror = ()=>{ /* ntfy auto-reconnects; ignore transient errors */ };
  }catch(e){
    // EventSource blocked/unavailable — global feed just won't get live updates
  }
}

/* ==========================================================================
   INVENTORY (stacking) — everything you've ever pulled, grouped by rarity
   ========================================================================== */
function renderInventory(){
  const summary = document.getElementById('inv-summary');
  const groups = document.getElementById('inv-groups');
  const names = Object.keys(state.itemCounts).filter(n => state.itemCounts[n] > 0);

  if(names.length === 0){
    summary.innerHTML = '';
    groups.innerHTML = `<div class="inv-empty">nothing unboxed yet — go press the button</div>`;
    return;
  }

  const nameToRarity = {};
  CONFIG.rarities.forEach(r=>{
    (CONFIG.items[r.key] || []).forEach(n=>{ nameToRarity[n] = r; });
  });

  let totalStacks = 0;
  const byRarity = {};
  names.forEach(n=>{
    const r = nameToRarity[n] || CONFIG.rarities[CONFIG.rarities.length-1];
    if(!byRarity[r.key]) byRarity[r.key] = { rarity: r, items: [] };
    byRarity[r.key].items.push(n);
    totalStacks += state.itemCounts[n];
  });

  summary.textContent = `${names.length} unique classmate${names.length===1?'':'s'} · ${fmtNum(totalStacks)} total unboxed`;

  groups.innerHTML = CONFIG.rarities.filter(r => byRarity[r.key]).map(r=>{
    const group = byRarity[r.key];
    const titleColor = (r.key === 'niche') ? 'var(--text)' : r.color;
    const cards = group.items.map(n=>{
      const count = state.itemCounts[n];
      const shinyCount = state.shinyCounts[n] || 0;
      return `<div class="inv-card ${shinyCount>0?'shiny':''}">
        <div class="inv-name">${escapeHtml(n)}</div>
        <div class="inv-count">x${count}</div>
        ${shinyCount>0 ? `<div class="inv-shiny-badge">✨ x${shinyCount}</div>` : ''}
      </div>`;
    }).join('');
    return `<div class="inv-group">
      <div class="inv-group-title" style="color:${titleColor}">${r.label} <span class="inv-group-count">(${group.items.length})</span></div>
      <div class="inv-grid">${cards}</div>
    </div>`;
  }).join('');
}

/* ==========================================================================
   RARITY / INDEX PANEL
   ========================================================================== */
function renderRarityList(){
  const all = effectiveRarities();
  const totalAll = totalWeight(all);
  const list = document.getElementById('rarity-list');
  list.innerHTML = '';
  all.forEach(r=>{
    const items = CONFIG.items[r.key] || [];
    const chance = fmtChanceValue(r.weight, totalAll);
    const shimmerClass = r.rainbow ? 'rainbow-border' : (r.foil ? 'foil-border' : '');
    const swatchStyle = shimmerClass ? '' : `background:${r.color}; box-shadow:0 0 8px ${r.color}99;`;
    const barStyle = shimmerClass ? '' : `background:${r.color};`;
    const nameColor = (r.key === 'niche') ? 'var(--text)' : r.color;
    const row = document.createElement('div');
    row.className = 'rarity-row';
    row.innerHTML = `
      <div class="rarity-row-head">
        <div class="chip ${shimmerClass}" style="${swatchStyle}"></div>
        <div class="rname" style="color:${nameColor}">${r.label}</div>
        <div class="rbar"><div class="rbar-fill ${shimmerClass}" style="width:${Math.max(0.4, (r.weight/totalAll)*100)}%; ${barStyle}"></div></div>
        <div class="rchance">${chance}</div>
        <div class="rcount">${items.length} item${items.length===1?'':'s'}</div>
        <div class="chev">▾</div>
      </div>
      <div class="rarity-items">
        <div class="rarity-items-inner">
          ${items.length ? items.map(n=>`<div class="item-tag">${escapeHtml(n)} <span class="cnt">${state.itemCounts[n]||0}</span></div>`).join('') : `<div class="item-tag empty">no names added yet — rolls of ${r.label} currently cascade down to the next filled tier</div>`}
        </div>
      </div>
    `;
    row.querySelector('.rarity-row-head').addEventListener('click', ()=>{
      const wasOpen = row.classList.contains('open');
      row.classList.toggle('open');
      const inner = row.querySelector('.rarity-items');
      inner.style.maxHeight = wasOpen ? '0px' : inner.scrollHeight+'px';
    });
    list.appendChild(row);
  });
}

/* ==========================================================================
   PAGE NAV
   ========================================================================== */
function showPage(name){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.page-nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page===name));
  if(name === 'inventory'){ renderInventory(); renderRarityList(); }
  if(name === 'feed'){ renderGlobalFeedFromCache(); }
}
document.querySelectorAll('.page-nav-btn').forEach(b=>{
  b.addEventListener('click', ()=> showPage(b.dataset.page));
});

/* ==========================================================================
   INIT
   ========================================================================== */
document.getElementById('unbox-btn').addEventListener('click', doUnbox);
document.getElementById('upgrades-grid').addEventListener('click', (e)=>{
  const btn = e.target.closest('.upgrade-buy-btn');
  if(!btn || btn.disabled) return;
  buyUpgrade(btn.dataset.key);
});

ensureLanes();
updateTotalDisplay();
renderAutoToggle();
checkAutoUnlock();
renderRarityList();
renderUpgrades();
renderInventory();
renderGlobalFeedFromCache();
processAwayCatchUp();
fetchGlobalFeedHistory();
initGlobalFeedSubscription();
heartbeat();
showPage('home');
</script>
