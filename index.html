<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DVC Clicker Pro · sharp edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ─── RESET ─── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg: #0a0a10;
            --surface: #12121c;
            --surface2: #1a1a2a;
            --surface3: #22223a;
            --border: rgba(255, 255, 255, 0.06);
            --border2: rgba(255, 255, 255, 0.14);
            --fg: #f0f0f8;
            --muted: rgba(255, 255, 255, 0.45);
            --primary: #7c5cfc;
            --primary-dim: rgba(124, 92, 252, 0.15);
            --primary-glow: rgba(124, 92, 252, 0.35);
            --gold: #ffc94a;
            --green: #39e58c;
            --red: #ff5d6c;
        }
        html,
        body {
            height: 100%;
        }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Manrope', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(124, 92, 252, 0.07), transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 201, 74, 0.04), transparent 50%);
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
        }

        /* ─── WRAPPER ─── */
        .game {
            width: 100%;
            max-width: 1160px;
            background: var(--surface);
            border: 1px solid var(--border2);
            padding: 1.75rem 2rem 1.5rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }
        .game::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary-glow), transparent 70%);
            opacity: 0.2;
            pointer-events: none;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
            gap: 0.75rem;
            position: relative;
            z-index: 2;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: var(--primary);
            text-shadow: 0 0 24px var(--primary-glow);
        }
        .logo small {
            font-size: 0.65rem;
            font-weight: 400;
            color: var(--muted);
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.04);
            padding: 0.15rem 0.8rem;
            border: 1px solid var(--border);
        }
        .stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .stat {
            background: var(--surface2);
            padding: 0.4rem 1.1rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
        }
        .stat .val {
            color: var(--fg);
            font-family: 'Space Grotesk', monospace;
            font-size: 0.9rem;
        }
        .stat .val.gold {
            color: var(--gold);
        }
        .stat .val.green {
            color: var(--green);
        }

        /* ─── MAIN GRID ─── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 2rem;
            position: relative;
            z-index: 2;
        }
        @media (max-width: 780px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* ─── CLICKER ─── */
        .clicker-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0;
        }
        .clicker {
            position: relative;
            width: 220px;
            height: 220px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.08s ease;
        }
        .clicker:active {
            transform: scale(0.92);
        }
        .clicker .dvc {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #34236a, #120e22);
            border: 2px solid var(--primary);
            box-shadow: 0 0 50px rgba(124, 92, 252, 0.25), inset 0 0 40px rgba(124, 92, 252, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 30px var(--primary-glow);
            transition: box-shadow 0.3s;
            position: relative;
        }
        .clicker .dvc:hover {
            box-shadow: 0 0 70px rgba(124, 92, 252, 0.4), inset 0 0 40px rgba(124, 92, 252, 0.15);
        }
        .clicker .dvc .sub {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--gold);
            opacity: 0.7;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 12px;
            border: 1px solid rgba(255, 201, 74, 0.12);
            margin-top: -2px;
        }
        .clicker .ripple {
            position: absolute;
            inset: -4px;
            border: 2px solid var(--primary);
            opacity: 0;
            animation: rippleOut 0.7s ease-out forwards;
            pointer-events: none;
        }
        @keyframes rippleOut {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        .clicker .part {
            position: absolute;
            pointer-events: none;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 16px var(--gold);
            animation: floatUp 0.9s ease-out forwards;
            font-family: 'Space Grotesk', monospace;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5);
            }
        }

        .clicker-stats {
            margin-top: 1.6rem;
            text-align: center;
        }
        .clicker-stats .total {
            font-family: 'Space Grotesk', monospace;
            font-size: 3.6rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--gold), #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.12s;
        }
        .clicker-stats .total.pop {
            animation: popNum 0.15s ease;
        }
        @keyframes popNum {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.06);
            }
            100% {
                transform: scale(1);
            }
        }
        .clicker-stats .label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.15rem;
            letter-spacing: 0.3px;
        }
        .clicker-stats .cps-badge {
            font-size: 0.85rem;
            color: var(--green);
            font-weight: 600;
            margin-top: 0.4rem;
            background: rgba(57, 229, 140, 0.07);
            padding: 0.2rem 1.2rem;
            border: 1px solid rgba(57, 229, 140, 0.12);
            display: inline-block;
        }

        /* ─── UPGRADES ─── */
        .upgrade-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.25rem;
            max-height: 540px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .upgrade-panel::-webkit-scrollbar {
            width: 3px;
        }
        .upgrade-panel::-webkit-scrollbar-thumb {
            background: var(--primary);
        }

        .panel-head {
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.2rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }
        .panel-head span {
            color: var(--gold);
            font-size: 0.75rem;
        }

        .upgrade {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 0.7rem 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            opacity: 0.5;
            pointer-events: none;
            cursor: default;
        }
        .upgrade.can {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
            border-color: rgba(124, 92, 252, 0.25);
        }
        .upgrade.can:hover {
            border-color: var(--primary);
            background: var(--surface3);
            transform: translateX(3px);
            box-shadow: 0 4px 20px rgba(124, 92, 252, 0.12);
        }
        .upgrade .info {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
        }
        .upgrade .info .name {
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .upgrade .info .name .owned {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.05rem 0.45rem;
            border: 1px solid var(--border);
        }
        .upgrade .info .desc {
            font-size: 0.65rem;
            color: var(--muted);
        }
        .upgrade .right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.1rem;
            flex-shrink: 0;
            margin-left: 0.8rem;
        }
        .upgrade .price {
            font-family: 'Space Grotesk', monospace;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--gold);
        }
        .upgrade .price .unit {
            font-size: 0.6rem;
            font-weight: 400;
            color: var(--muted);
        }
        .upgrade .add {
            font-size: 0.65rem;
            color: var(--green);
            font-weight: 600;
        }

        /* ─── FOOTER ─── */
        .footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--muted);
            flex-wrap: wrap;
            gap: 0.6rem;
            position: relative;
            z-index: 2;
        }
        .footer .reset {
            background: rgba(255, 93, 108, 0.08);
            border: 1px solid rgba(255, 93, 108, 0.18);
            padding: 0.2rem 1rem;
            color: var(--red);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .footer .reset:hover {
            background: rgba(255, 93, 108, 0.16);
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2);
            border: 1px solid var(--border2);
            padding: 0.6rem 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--fg);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 500px) {
            .game {
                padding: 1rem 1rem 1.2rem;
            }
            .clicker {
                width: 170px;
                height: 170px;
            }
            .clicker .dvc {
                font-size: 3rem;
            }
            .clicker-stats .total {
                font-size: 2.6rem;
            }
            .stats {
                gap: 0.5rem;
            }
            .stat {
                padding: 0.25rem 0.7rem;
                font-size: 0.65rem;
            }
            .stat .val {
                font-size: 0.75rem;
            }
            .grid {
                gap: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- ─── GAME ─── -->
    <div class="game">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">
                DVC<span>Clicker</span>
                <small>sharp</small>
            </div>
            <div class="stats">
                <div class="stat">🍪 CPS <span class="val green" id="cpsDisplay">0.0</span></div>
                <div class="stat">🖱️ Clicks <span class="val gold" id="totalClicksDisplay">0</span></div>
                <div class="stat">📦 <span class="val" id="upgradeCountDisplay">0</span></div>
            </div>
        </div>

        <!-- GRID -->
        <div class="grid">

            <!-- CLICKER COLUMN -->
            <div class="clicker-col">
                <div class="clicker" id="clicker">
                    <div class="dvc">
                        DVC
                        <span class="sub">College</span>
                    </div>
                </div>
                <div class="clicker-stats">
                    <div class="total" id="cookieCount">0</div>
                    <div class="label">DVC tokens</div>
                    <div class="cps-badge" id="cpsLabel">+0.0 / sec</div>
                </div>
            </div>

            <!-- UPGRADE PANEL -->
            <div class="upgrade-panel" id="upgradePanel">
                <div class="panel-head">🛠️ Upgrades <span id="upgradeCount">0</span></div>
                <div id="upgradeList"></div>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            <span>© DVC Clicker Pro · sharp edition</span>
            <button class="reset" id="resetBtn">⟳ Reset</button>
        </div>

    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        /* ================================================================
           DVC CLICKER PRO — SHARP EDITION
           ================================================================ */

        // ─── STATE ───
        const S = {
            cookies: 0,
            totalClicks: 0,
            upgrades: {}
        };

        // ─── UPGRADE DEFINITIONS ───
        const UPGRADES = [
            { id: 'cursor', name: '🖱️ Cursor', desc: 'Auto-click every second', baseCost: 15, cps: 0.2, mult: 1.15,
            max: 100 },
            { id: 'grandma', name: '👵 Grandma', desc: 'Bakes cookies with love', baseCost: 100, cps: 1, mult: 1.15,
            max: 80 },
            { id: 'farm', name: '🌾 Farm', desc: 'Harvest fresh cookies', baseCost: 500, cps: 4, mult: 1.14, max: 60 },
            { id: 'mine', name: '⛏️ Mine', desc: 'Dig up cookie ore', baseCost: 3000, cps: 12, mult: 1.13, max: 50 },
            { id: 'factory', name: '🏭 Factory', desc: 'Mass-produce cookies', baseCost: 15000, cps: 40, mult: 1.12,
            max: 40 },
            { id: 'portal', name: '🌀 Portal', desc: 'Summon cookies from elsewhere', baseCost: 80000, cps: 150,
                mult: 1.10, max: 30 },
            { id: 'time', name: '⏳ Time Machine', desc: 'Bake cookies from the future', baseCost: 400000, cps: 500,
                mult: 1.08, max: 20 },
            { id: 'antimatter', name: '⚛️ Antimatter', desc: 'Annihilate into cookies', baseCost: 2000000, cps: 2000,
                mult: 1.07, max: 15 },
            { id: 'universe', name: '🌌 Universe', desc: 'Create a cookie universe', baseCost: 10000000, cps: 8000,
                mult: 1.06, max: 10 },
        ];

        // ─── HELPERS ───
        function getCost(u) {
            const owned = S.upgrades[u.id] || 0;
            if (owned >= u.max) return Infinity;
            return Math.floor(u.baseCost * Math.pow(u.mult, owned));
        }

        function getTotalCPS() {
            let t = 0;
            for (const u of UPGRADES) {
                const owned = S.upgrades[u.id] || 0;
                t += owned * u.cps;
            }
            return t;
        }

        function getTotalUpgrades() {
            let c = 0;
            for (const u of UPGRADES) c += (S.upgrades[u.id] || 0);
            return c;
        }

        function fmt(n) {
            if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return Math.floor(n).toString();
        }

        let _updating = false;

        // ─── UI UPDATE ───
        function updateUI() {
            if (_updating) return;
            _updating = true;
            requestAnimationFrame(() => {
                const cps = getTotalCPS();
                const el = document.getElementById('cookieCount');
                el.textContent = fmt(S.cookies);
                el.classList.remove('pop');
                void el.offsetWidth;
                el.classList.add('pop');

                document.getElementById('cpsDisplay').textContent = cps.toFixed(1);
                document.getElementById('cpsLabel').textContent = '+' + cps.toFixed(1) + ' / sec';
                document.getElementById('totalClicksDisplay').textContent = S.totalClicks;
                const total = getTotalUpgrades();
                document.getElementById('upgradeCount').textContent = total;
                document.getElementById('upgradeCountDisplay').textContent = total;

                renderUpgrades();
                _updating = false;
            });
        }

        function renderUpgrades() {
            const list = document.getElementById('upgradeList');
            list.innerHTML = '';
            for (const u of UPGRADES) {
                const owned = S.upgrades[u.id] || 0;
                const cost = getCost(u);
                const can = S.cookies >= cost && owned < u.max;
                const div = document.createElement('div');
                div.className = 'upgrade' + (can ? ' can' : '');
                const add = (owned < u.max) ? u.cps : 0;
                div.innerHTML = `
              <div class="info">
                <span class="name">${u.name} <span class="owned">${owned}</span></span>
                <span class="desc">${u.desc}</span>
              </div>
              <div class="right">
                <div class="price">${cost === Infinity ? 'MAX' : '🍪 ' + fmt(cost)}</div>
                ${add > 0 ? `<div class="add">+${add} CPS</div>` : ''}
              </div>
            `;
                if (can) {
                    div.addEventListener('click', (e) => {
                        e.stopPropagation();
                        purchase(u.id);
                    });
                }
                list.appendChild(div);
            }
        }

        // ─── PURCHASE ───
        let _purchasing = false;

        function purchase(id) {
            if (_purchasing) return;
            const u = UPGRADES.find(x => x.id === id);
            if (!u) return;
            const cost = getCost(u);
            if (S.cookies < cost) return;
            _purchasing = true;
            S.cookies -= cost;
            S.upgrades[id] = (S.upgrades[id] || 0) + 1;
            updateUI();
            showToast(`✅ ${u.name} purchased!`);
            saveGame();
            setTimeout(() => { _purchasing = false; }, 100);
        }

        // ─── CLICK ───
        function handleClick(e) {
            const el = document.getElementById('clicker');

            // ripple
            const rip = document.createElement('div');
            rip.className = 'ripple';
            el.appendChild(rip);
            setTimeout(() => rip.remove(), 700);

            // particle
            const rect = el.getBoundingClientRect();
            const cx = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width / 2) - rect.left;
            const cy = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height / 2) - rect.top;
            const p = document.createElement('div');
            p.className = 'part';
            const cursorBoost = (S.upgrades['cursor'] || 0) * 0.1;
            const gain = 1 + cursorBoost;
            p.textContent = '+' + (gain >= 1 ? gain.toFixed(1) : '1');
            const angle = Math.random() * 2 * Math.PI;
            const dist = 45 + Math.random() * 65;
            p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--ty', Math.sin(angle) * dist - 45 + 'px');
            p.style.left = cx + 'px';
            p.style.top = cy + 'px';
            el.appendChild(p);
            setTimeout(() => p.remove(), 900);

            S.cookies += gain;
            S.totalClicks++;
            updateUI();
            saveGame();
        }

        // ─── SAVE / LOAD ───
        function saveGame() {
            try {
                localStorage.setItem('dvcClickerSharp', JSON.stringify({
                    cookies: S.cookies,
                    totalClicks: S.totalClicks,
                    upgrades: S.upgrades
                }));
            } catch (_) {}
        }

        function loadGame() {
            try {
                const raw = localStorage.getItem('dvcClickerSharp');
                if (!raw) return false;
                const data = JSON.parse(raw);
                S.cookies = data.cookies || 0;
                S.totalClicks = data.totalClicks || 0;
                S.upgrades = data.upgrades || {};
                return true;
            } catch (_) { return false; }
        }

        function resetGame() {
            if (!confirm('Reset all progress?')) return;
            S.cookies = 0;
            S.totalClicks = 0;
            S.upgrades = {};
            localStorage.removeItem('dvcClickerSharp');
            updateUI();
            showToast('↻ Reset complete.');
        }

        // ─── TOAST ───
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._h);
            t._h = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ─── LOOP ───
        let _last = 0;

        function loop(ts) {
            if (!_last) _last = ts;
            const delta = (ts - _last) / 1000;
            if (delta >= 0.1) {
                const cps = getTotalCPS();
                if (cps > 0) {
                    S.cookies += cps * delta;
                    updateUI();
                    saveGame();
                }
                _last = ts;
            }
            requestAnimationFrame(loop);
        }

        // ─── INIT ───
        function init() {
            const loaded = loadGame();
            for (const u of UPGRADES) {
                if (!(u.id in S.upgrades)) S.upgrades[u.id] = 0;
            }
            updateUI();
            if (!loaded) showToast('🍪 Click the DVC logo to start!');

            const clicker = document.getElementById('clicker');
            clicker.addEventListener('click', handleClick);
            clicker.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleClick(e);
            }, { passive: false });

            document.getElementById('resetBtn').addEventListener('click', resetGame);

            requestAnimationFrame(loop);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
