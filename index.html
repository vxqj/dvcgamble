<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DVC GAMBLE — Unbox</title>
<link id="favicon-link" rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DVC GAMBLE — design tokens
   ============================================================ */
:root{
  --bg: #08080d;
  --bg-2: #0d0d14;
  --surface: #121219;
  --surface-2: #191922;
  --border: #24242f;
  --border-soft: #1b1b24;
  --text: #eef0f6;
  --muted: #8b8fa3;
  --muted-2: #5c5f70;
  --gold: #f2c14e;
  --gold-dim: #b8944a;
  --danger: #ff4d5e;

  --c-common:    #9aa0ad;
  --c-uncommon:  #33d17a;
  --c-rare:      #2f8fff;
  --c-epic:      #a855f7;
  --c-legendary: #ff9d1f;
  --c-mythical:  #ff3b4a;
  --c-secret1:   #7c5cff;
  --c-secret2:   #ff2ec4;
  --c-niche:     #ffffff;
  --c-teacher:   #e8c766;

  --font-display: 'Anton', 'Arial Narrow', sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*{ box-sizing: border-box; margin:0; padding:0; }
html{ background: var(--bg); }
body{
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(242,193,78,0.08), transparent 60%),
    radial-gradient(ellipse 700px 500px at 90% 10%, rgba(124,92,255,0.06), transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}
::selection{ background: var(--gold); color:#000; }
::-webkit-scrollbar{ width:10px; }
::-webkit-scrollbar-track{ background: var(--bg); }
::-webkit-scrollbar-thumb{ background: var(--surface-2); border-radius:10px; }

a{ color: inherit; }
button{ font-family: inherit; }

.wrap{
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* ---------------- header ---------------- */
header.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 22px 0 18px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 34px;
  gap: 16px;
  flex-wrap: wrap;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.brand img{
  height: 40px;
  width: 40px;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(242,193,78,0.35));
}
.brand-text .name{
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 1px;
  line-height: 1;
}
.brand-text .name span{ color: var(--gold); }
.brand-text .tag{
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--muted-2);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 3px;
}

.stats-pill-group{
  display:flex;
  align-items:center;
  gap:10px;
}
.stat-pill{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  min-width: 108px;
}
.stat-pill .label{
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--muted-2);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.stat-pill .value{
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 16px;
  color: var(--gold);
  letter-spacing: 0.5px;
}

#auto-toggle{
  display:none;
  align-items:center;
  gap:8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .18s ease;
}
#auto-toggle:hover{ border-color: var(--gold-dim); color: var(--text); }
#auto-toggle .dot{
  width:7px; height:7px; border-radius:50%;
  background: var(--muted-2);
  transition: all .18s ease;
}
#auto-toggle.on{
  border-color: var(--gold);
  color: var(--gold);
}
#auto-toggle.on .dot{
  background: #38ff7a;
  box-shadow: 0 0 8px #38ff7a;
}

/* ---------------- hero / reel ---------------- */
.hero{
  text-align:center;
  margin-bottom: 8px;
}
.hero h1{
  font-family: var(--font-display);
  font-size: clamp(30px, 5vw, 46px);
  letter-spacing: 1px;
  line-height: 1.05;
}
.hero h1 span{ color: var(--gold); }
.hero p{
  color: var(--muted);
  font-size: 14px;
  margin-top: 8px;
}

.reel-stage{
  position: relative;
  margin: 30px 0 26px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 14px;
  overflow: hidden;
}
.reel-rows{
  display:flex;
  flex-direction:column;
  gap: 10px;
}
.reel-viewport{
  position: relative;
  height: 132px;
  overflow: hidden;
  border-radius: 12px;
  background:
    linear-gradient(90deg, var(--bg-2) 0%, transparent 8%, transparent 92%, var(--bg-2) 100%),
    var(--bg-2);
}
.reel-viewport::before{ /* left fade */
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(90deg, var(--surface) 0%, transparent 10%, transparent 90%, var(--surface) 100%);
  pointer-events:none;
  z-index: 3;
}
.reel-pointer{
  position:absolute;
  top:0; bottom:0;
  left:50%;
  width:2px;
  background: var(--gold);
  transform: translateX(-50%);
  z-index: 4;
  box-shadow: 0 0 12px rgba(242,193,78,0.9), 0 0 30px rgba(242,193,78,0.4);
}
.reel-pointer::before, .reel-pointer::after{
  content:'';
  position:absolute; left:50%; transform:translateX(-50%);
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
}
.reel-pointer::before{ top:-1px; border-top: 9px solid var(--gold); }
.reel-pointer::after{ bottom:-1px; border-bottom: 9px solid var(--gold); }

.reel-track{
  position:absolute;
  top: 10px;
  left: 0;
  display:flex;
  gap: 10px;
  will-change: transform;
}
.reel-track.spinning .reel-item{ filter: blur(0.4px); }

.reel-item{
  flex: 0 0 auto;
  width: 96px;
  height: 112px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding: 6px;
  text-align:center;
}
.reel-item .swatch{
  width: 34px; height: 34px;
  border-radius: 8px;
}
.reel-item .r-label{
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: .5px;
  text-transform: uppercase;
  opacity: .85;
}
.reel-item .i-name{
  font-size: 10.5px;
  font-weight: 600;
  line-height: 1.15;
  max-width: 84px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.reel-item.win{
  transform: scale(1.06);
  z-index: 2;
}

.reel-idle-msg{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  color: var(--muted-2);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  z-index: 2;
  pointer-events:none;
}
.reel-viewport.has-spun .reel-idle-msg{ display:none; }

/* result banner under reel */
.result-line{
  min-height: 30px;
  text-align:center;
  margin-top: 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: .5px;
  color: var(--muted);
}
.result-line .r-name{ font-weight: 700; }
.result-line.show{ animation: resultPop .35s ease; }
@keyframes resultPop{
  0%{ opacity:0; transform: translateY(4px); }
  100%{ opacity:1; transform: translateY(0); }
}

/* ---------------- unbox control ---------------- */
.control-row{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap: 10px;
  margin: 26px 0 10px;
}
.unbox-btn-wrap{
  position: relative;
  width: 158px;
  height: 158px;
}
.unbox-ring{
  position:absolute; inset:0;
  transform: rotate(-90deg);
}
.unbox-ring circle{
  fill:none;
  stroke-width: 4;
}
.unbox-ring .track{ stroke: var(--border); }
.unbox-ring .fill{
  stroke: var(--gold);
  stroke-linecap: round;
  transition: stroke-dashoffset .05s linear;
  filter: drop-shadow(0 0 6px rgba(242,193,78,.6));
}

#unbox-btn{
  position:absolute;
  top: 10px; left:10px; right:10px; bottom:10px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: radial-gradient(circle at 35% 25%, #2a2a35, #121218 70%);
  color: var(--gold);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap: 6px;
  box-shadow:
    inset 0 0 0 1px var(--border),
    0 10px 30px rgba(0,0,0,.5);
  transition: transform .12s ease, box-shadow .2s ease;
  animation: idleGlow 2.6s ease-in-out infinite;
}
@keyframes idleGlow{
  0%,100%{ box-shadow: inset 0 0 0 1px var(--border), 0 10px 30px rgba(0,0,0,.5), 0 0 0px rgba(242,193,78,0); }
  50%{ box-shadow: inset 0 0 0 1px var(--gold-dim), 0 10px 30px rgba(0,0,0,.5), 0 0 26px rgba(242,193,78,.25); }
}
#unbox-btn:hover:not(:disabled){ transform: scale(1.035); }
#unbox-btn:active:not(:disabled){ transform: scale(0.97); }
#unbox-btn:disabled{
  cursor: not-allowed;
  color: var(--muted-2);
  animation: none;
}
#unbox-btn svg{ width: 40px; height:40px; }
#unbox-btn .btn-label{
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 1.5px;
}
#unbox-btn .cd-text{
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  min-height: 14px;
}

.auto-hint{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-2);
  text-align:center;
  min-height: 14px;
}

/* ---------------- history ---------------- */
.history-row{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding: 4px 2px 14px;
  margin-top: 6px;
}
.history-row::-webkit-scrollbar{ height:6px; }
.hist-chip{
  flex:0 0 auto;
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  white-space: nowrap;
  opacity: 0;
  animation: chipIn .3s ease forwards;
}
@keyframes chipIn{ from{ opacity:0; transform: translateY(4px);} to{ opacity:1; transform:none; } }

/* ---------------- index / odds panel ---------------- */
.section-title{
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: 1px;
  margin: 46px 0 14px;
  display:flex;
  align-items:center;
  gap: 10px;
}
.section-title .line{
  flex:1;
  height:1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.rarity-list{
  display:flex;
  flex-direction:column;
  gap: 8px;
}
.rarity-row{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.rarity-row-head{
  display:flex;
  align-items:center;
  gap: 12px;
  padding: 12px 14px;
  cursor: pointer;
  user-select: none;
}
.rarity-row-head .chip{
  width: 12px; height:12px;
  border-radius: 4px;
  flex: 0 0 auto;
}
.rarity-row-head .rname{
  font-weight: 700;
  font-size: 14px;
  flex: 0 0 auto;
  min-width: 120px;
}
.rarity-row-head .rbar{
  flex:1;
  height: 6px;
  background: var(--bg-2);
  border-radius: 4px;
  overflow:hidden;
}
.rarity-row-head .rbar-fill{
  height:100%;
  border-radius: 4px;
}
.rarity-row-head .rchance{
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  width: 74px;
  text-align:right;
  flex: 0 0 auto;
}
.rarity-row-head .rcount{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted-2);
  width: 54px;
  text-align:right;
  flex: 0 0 auto;
}
.rarity-row-head .chev{
  color: var(--muted-2);
  transition: transform .2s ease;
  flex: 0 0 auto;
}
.rarity-row.open .chev{ transform: rotate(180deg); }

.rarity-items{
  max-height:0;
  overflow:hidden;
  transition: max-height .25s ease;
  border-top: 1px solid var(--border-soft);
}
.rarity-row.open .rarity-items{ border-top: 1px solid var(--border-soft); }
.rarity-items-inner{
  padding: 10px 14px 14px 38px;
  display:flex;
  flex-wrap:wrap;
  gap: 8px;
}
.item-tag{
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 9px;
  border-radius: 6px;
  background: var(--bg-2);
  border: 1px solid var(--border-soft);
  color: var(--muted);
  display:flex; gap:6px; align-items:center;
}
.item-tag .cnt{ color: var(--gold-dim); }
.item-tag.empty{ color: var(--muted-2); font-style: italic; }

footer{
  text-align:center;
  margin-top: 60px;
  color: var(--muted-2);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .5px;
}

/* ---------------- fx overlays ---------------- */
#flash-overlay{
  position: fixed; inset:0;
  pointer-events:none;
  z-index: 9998;
  opacity: 0;
  mix-blend-mode: screen;
}
#particle-layer{
  position: fixed; inset:0;
  pointer-events:none;
  z-index: 9999;
  overflow: hidden;
}
.particle{
  position:absolute;
  border-radius: 2px;
  opacity: 1;
  animation: particleFly var(--dur) cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes particleFly{
  0%{ transform: translate(0,0) rotate(0deg); opacity:1; }
  100%{ transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity:0; }
}

.shake{ animation: shakeKf .5s ease; }
@keyframes shakeKf{
  0%,100%{ transform: translate(0,0); }
  10%{ transform: translate(-6px,3px); }
  20%{ transform: translate(6px,-3px); }
  30%{ transform: translate(-5px,-3px); }
  40%{ transform: translate(5px,3px); }
  50%{ transform: translate(-4px,2px); }
  60%{ transform: translate(4px,-2px); }
  70%{ transform: translate(-3px,1px); }
  80%{ transform: translate(3px,-1px); }
  90%{ transform: translate(-2px,1px); }
}

.rainbow-border{
  background: linear-gradient(90deg,#ff2ec4,#ff9d1f,#f2ff2e,#33d17a,#2f8fff,#7c5cff,#ff2ec4);
  background-size: 300% 100%;
  animation: rainbowMove 1.4s linear infinite;
}
@keyframes rainbowMove{
  0%{ background-position: 0% 50%; }
  100%{ background-position: 300% 50%; }
}

.foil-border{
  background: linear-gradient(90deg,#3a2f0f,#e8c766,#3a2f0f,#e8c766,#3a2f0f);
  background-size: 300% 100%;
  animation: foilMove 2.2s linear infinite;
}
@keyframes foilMove{
  0%{ background-position: 0% 50%; }
  100%{ background-position: 300% 50%; }
}

@media (max-width: 560px){
  .stats-pill-group{ gap:6px; }
  .stat-pill{ min-width: 84px; padding: 7px 10px; }
  .rarity-row-head .rname{ min-width: 84px; font-size: 12.5px; }
  .rarity-row-head .rcount{ display:none; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}

/* ---------------- dock nav ---------------- */
#dock-wrap{
  position: sticky;
  top: 14px;
  z-index: 100;
  display: flex;
  justify-content: center;
  padding: 0 0 22px;
}
#dock{
  display:flex;
  gap: 4px;
  background: rgba(18,18,25,0.82);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,.4);
  transition: border-radius .35s cubic-bezier(.2,.8,.2,1), padding .35s cubic-bezier(.2,.8,.2,1), gap .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
}
#dock.pill{
  border-radius: 999px;
  padding: 5px;
  gap: 2px;
  transform: scale(0.94);
}
#dock button{
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 11px;
  cursor: pointer;
  transition: all .25s cubic-bezier(.2,.8,.2,1);
  white-space: nowrap;
}
#dock.pill button{ padding: 7px 13px; font-size: 10.5px; border-radius: 999px; }
#dock button:hover{ color: var(--text); }
#dock button.active{
  background: var(--gold);
  color: #0a0805;
  font-weight: 700;
}

.view{ display:none; }
.view.active{ display:block; animation: viewIn .25s ease; }
@keyframes viewIn{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:none; } }

/* ---------------- upgrades ---------------- */
.upgrade-card{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 12px;
  display:flex;
  align-items:center;
  gap: 16px;
  flex-wrap: wrap;
}
.upgrade-icon{
  width: 44px; height:44px;
  border-radius: 10px;
  background: var(--bg-2);
  display:flex; align-items:center; justify-content:center;
  font-size: 20px;
  flex: 0 0 auto;
}
.upgrade-info{ flex: 1 1 180px; min-width: 160px; }
.upgrade-info .uname{ font-weight:700; font-size: 14px; margin-bottom: 3px; }
.upgrade-info .udesc{ color: var(--muted); font-size: 12px; line-height:1.4; }
.upgrade-level{
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--gold-dim);
  letter-spacing: .5px;
}
.upgrade-buy{
  background: var(--bg-2);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: .5px;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .18s ease;
  flex: 0 0 auto;
}
.upgrade-buy:hover:not(:disabled){ background: var(--gold); color:#0a0805; }
.upgrade-buy:disabled{ opacity:.4; cursor:not-allowed; border-color: var(--border); color: var(--muted-2); }
.upgrade-maxed{
  font-family: var(--font-mono);
  font-size: 11px;
  color: #38ff7a;
  letter-spacing: .5px;
}

/* ---------------- global unbox feed / toast ---------------- */
#global-toast-layer{
  position: fixed;
  top: 90px;
  right: 18px;
  z-index: 500;
  display:flex;
  flex-direction:column;
  gap: 8px;
  pointer-events:none;
}
.global-toast{
  background: rgba(18,18,25,0.92);
  border: 1px solid var(--gold-dim);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  max-width: 240px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  animation: toastIn .3s ease, toastOut .3s ease 4.2s forwards;
}
@keyframes toastIn{ from{ opacity:0; transform: translateX(20px);} to{ opacity:1; transform:none; } }
@keyframes toastOut{ to{ opacity:0; transform: translateX(20px); } }
.global-feed-list{ display:flex; flex-direction:column; gap:8px; }
.global-feed-empty{ color: var(--muted-2); font-family: var(--font-mono); font-size: 12px; text-align:center; padding: 20px 0; }
</style>
</head>
<body>

<div id="flash-overlay"></div>
<div id="particle-layer"></div>
<div id="global-toast-layer"></div>

<div class="wrap" id="page">
  <header class="topbar">
    <div class="brand">
      <img id="logo-img" src="data:image/png;base64,iVBORw0KGgo=" alt="DVC logo" />
      <div class="brand-text">
        <div class="name">DVC <span>GAMBLE</span></div>
        <div class="tag">case opening · beta</div>
      </div>
    </div>
    <div class="stats-pill-group">
      <button id="auto-toggle" title="Automatically unbox after every cooldown">
        <span class="dot"></span> Auto-Unbox: OFF
      </button>
      <div class="stat-pill">
        <div class="label">Rolls</div>

    secret1:   ["Christian Troung", "Jett Thompson", "Chase Bethune", "Hector Something", "Conner Smith", "Marcus Baker Glen", "Milan Brkljac"],

    common:    ["Nathan Foster", "Blake Smith", "Conner Cross", "Sam Luck", "Mitchell Taylor", "Jarrah Vickery Stewart", "Conner Wilson", "Cooper Burgess", "Ben Smith", "Remy Smith", "Michael Andrews", "Max Davidson", "Luke Danahay", "Mikey Haung", "Eden Harris", "Jai Pudding", "Lachie Masci", "Lucas Galenti", "Lucas Giles"],
  },

  // ---- Upgrades ---------------------------------------------------------
  // Spent using "Rolls" (1 earned per unbox — separate from the lifetime
  // "Total Unboxed" stat, which never goes down). cost(level) is rounded
  // baseCost * costGrowth^level, level being the level you're BUYING (0-indexed).
  upgrades: {

             desc: lvl => `+${Math.round(lvl*18)}% weight on Rare and above, pulled from Common/Uncommon` },
    speed: { label: "Unbox Speed", icon: "⚡", maxLevel: 5, baseCost: 40,  costGrowth: 1.6, effectPerLevel: 0.12,
             desc: lvl => `-${Math.round(lvl*12)}% cooldown between unboxes` },
    multi: { label: "Multi-Unbox", icon: "✌️", maxLevel: 1, baseCost: 300, costGrowth: 1,   effectPerLevel: 1,

function upgradeCost(key, level){
  const u = CONFIG.upgrades[key];
  return Math.round(u.baseCost * Math.pow(u.costGrowth, level));
}
function upgradeLevel(key){ return (state.upgradeLevels && state.upgradeLevels[key]) || 0; }

// Luck reallocates probability from Common/Uncommon into Rare-and-above —
// it never adds weight out of nowhere, same "closed pool" rule the empty-tier
// cascade already follows, so displayed odds always sum to the same total.
const RARE_AND_UP = ["rare","epic","legendary","mythical","secret1","secret2","niche","teacher"];
const COMMON_END = ["common","uncommon"];
function getEffectiveRarities(){
  const lvl = upgradeLevel('luck');
  if(lvl <= 0) return CONFIG.rarities;
  const boost = 1 + lvl * CONFIG.upgrades.luck.effectPerLevel;
  const boosted = CONFIG.rarities.map(r => RARE_AND_UP.includes(r.key) ? Object.assign({}, r, {weight: r.weight*boost}) : Object.assign({}, r));
  const extra = totalWeight(boosted) - totalWeight(CONFIG.rarities);
  const commonTotal = boosted.filter(r => COMMON_END.includes(r.key)).reduce((s,r)=>s+r.weight,0);
  return boosted.map(r=>{
    if(COMMON_END.includes(r.key) && commonTotal > 0){
      const share = r.weight / commonTotal;
      return Object.assign({}, r, {weight: Math.max(1, r.weight - extra*share)});
    }
    return r;
  });
}
function effectiveCooldownMs(){
  const lvl = upgradeLevel('speed');
  const mult = Math.max(0.35, 1 - lvl * CONFIG.upgrades.speed.effectPerLevel);
  return Math.round(CONFIG.cooldownMs * mult);
}
function effectiveUnboxCount(){
  return upgradeLevel('multi') >= 1 ? 2 : 1;
}

/* ==========================================================================
   STATE + STORAGE
   ========================================================================== */
function loadState(){
  const fallback = {
    total: 0, autoUnbox: false, rarityCounts: {}, itemCounts: {},
    rolls: 0,                                   // spendable currency — separate from `total`, which stays a lifetime stat
    upgradeLevels: { luck: 0, speed: 0, multi: 0 },
  };
  try{
    const raw = localStorage.getItem(CONFIG.storageKey);
    if(!raw) return fallback;
    const parsed = JSON.parse(raw);
    const merged = Object.assign({}, fallback, parsed);
    merged.upgradeLevels = Object.assign({}, fallback.upgradeLevels, parsed.upgradeLevels || {});
    return merged;
  }catch(e){
    return fallback;
  }
}
let state = loadState();
let memoryOnly = false;
function saveState(){
  try{
    localStorage.setItem(CONFIG.storageKey, JSON.stringify(state));
  }catch(e){
    memoryOnly = true;
  }
}

let cooldownActive = false;
let cooldownRAF = null;

if(CONFIG.catboxFaviconUrl && CONFIG.catboxFaviconUrl.trim()){
  document.getElementById('favicon-link').href = CONFIG.catboxFaviconUrl.trim();
}

document.getElementById('unbox-icon-slot').innerHTML = CONFIG.unboxIconSvg;

function rarityPool(){
  return CONFIG.rarities.filter(r => (CONFIG.items[r.key] || []).length > 0);
}
function totalWeight(list){
  return list.reduce((s,r)=> s + r.weight, 0);
}
function weightedPickRarity(){
  const all = getEffectiveRarities();
  const total = totalWeight(all);
  if(total <= 0) return null;
  let roll = Math.random() * total;
  let chosenIndex = all.length - 1;
  for(let i=0;i<all.length;i++){
    if(roll < all[i].weight){ chosenIndex = i; break; }
    roll -= all[i].weight;
  }
  for(let i=chosenIndex; i<all.length; i++){
    if((CONFIG.items[all[i].key] || []).length > 0) return all[i];
  }
  for(let i=chosenIndex-1; i>=0; i--){
    if((CONFIG.items[all[i].key] || []).length > 0) return all[i];
  }
  return null;
}
function pickItem(rarity){
  const list = CONFIG.items[rarity.key] || [];
  return list[Math.floor(Math.random() * list.length)];
}
function fmtChance(weight, total){
  const pct = (weight/total)*100;
  if(pct < 0.001) return pct.toFixed(5)+"%";
  if(pct < 1) return pct.toFixed(3)+"%";
  return pct.toFixed(2)+"%";
}
function fmtNum(n){ return n.toLocaleString('en-US'); }

let actx = null;
function ac(){
  if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if(actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, start, dur, type='sine', gainPeak=0.18){
  const c = ac();
  const osc = c.createOscillator();
  const g = c.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, c.currentTime + start);
  g.gain.setValueAtTime(0, c.currentTime + start);
  g.gain.linearRampToValueAtTime(gainPeak, c.currentTime + start + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + start + dur);
  osc.connect(g); g.connect(c.destination);
  osc.start(c.currentTime + start);
  osc.stop(c.currentTime + start + dur + 0.05);
}
function playPop(){
  tone(520, 0, 0.09, 'sine', 0.16);
  tone(720, 0.02, 0.07, 'sine', 0.1);
}
function playReveal(fx){
  if(fx <= 0){
    tone(440, 0, 0.12, 'triangle', 0.13);
  } else if(fx === 1){
    tone(520, 0, 0.1, 'triangle', 0.15);
    tone(780, 0.06, 0.16, 'triangle', 0.13);
  } else if(fx === 2){
    tone(392, 0, 0.12, 'sawtooth', 0.09);
    tone(587, 0.07, 0.14, 'triangle', 0.15);
    tone(880, 0.14, 0.22, 'triangle', 0.16);
    tone(1174, 0.2, 0.28, 'sine', 0.12);
  } else {
    tone(261, 0, 0.14, 'sawtooth', 0.08);
    tone(392, 0.08, 0.16, 'sawtooth', 0.1);
    tone(587, 0.16, 0.18, 'triangle', 0.14);
    tone(880, 0.24, 0.24, 'triangle', 0.16);
    tone(1318, 0.32, 0.3, 'sine', 0.16);
    tone(1760, 0.4, 0.5, 'sine', 0.12);
  }
}

function spawnParticles(color, count){
  const layer = document.getElementById('particle-layer');
  const cx = window.innerWidth/2, cy = window.innerHeight*0.42;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random()*Math.PI*2;
    const dist = 120 + Math.random()*260;
    const tx = Math.cos(angle)*dist;
    const ty = Math.sin(angle)*dist - 40;
    const size = 4 + Math.random()*6;
    p.style.setProperty('--tx', tx+'px');
    p.style.setProperty('--ty', ty+'px');
    p.style.setProperty('--rot', (Math.random()*720-360)+'deg');
    p.style.setProperty('--dur', (0.7+Math.random()*0.6)+'s');
    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.left = cx+'px';
    p.style.top = cy+'px';
    p.style.background = color;
    p.style.boxShadow = `0 0 6px ${color}`;
    layer.appendChild(p);
    setTimeout(()=> p.remove(), 1500);
  }
}
function screenFlash(color){
  const el = document.getElementById('flash-overlay');
  el.style.background = `radial-gradient(circle at 50% 40%, ${color}55, transparent 65%)`;
  el.style.transition = 'none';
  el.style.opacity = '1';
  requestAnimationFrame(()=>{
    el.style.transition = 'opacity .6s ease';
    el.style.opacity = '0';
  });
}
function screenShake(){
  const page = document.getElementById('page');
  page.classList.remove('shake');
  void page.offsetWidth;
  page.classList.add('shake');
}

const ITEM_W = 96, ITEM_GAP = 10, SLOT = ITEM_W + ITEM_GAP;

function fillerCard(){
  const pool = rarityPool();
  const r = pool.length ? pool[Math.floor(Math.random()*pool.length)] : CONFIG.rarities[CONFIG.rarities.length-1];
  const name = pickItem(r) || r.label;
  return { rarity: r, name };
}

function buildCardEl(cardData, isWin){
  const { rarity, name } = cardData;
  const el = document.createElement('div');
  el.className = 'reel-item' + (isWin ? ' win' : '');
  el.innerHTML = `
    <div class="swatch" style="background:${rarity.color}; box-shadow:0 0 10px ${rarity.color}88;"></div>
    <div class="r-label" style="color:${rarity.color};">${rarity.label}</div>
    <div class="i-name">${escapeHtml(name)}</div>
  `;
  return el;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Builds N stacked reel rows (N = 1 normally, 2 once the Multi-Unbox upgrade
// is bought) inside #reel-rows. Only rebuilds the DOM when the row count
// actually changes, so it doesn't fight the in-flight spin animation.
let currentReelRowCount = 0;
function ensureReelRows(count){
  if(currentReelRowCount === count) return;
  const container = document.getElementById('reel-rows');
  container.innerHTML = '';
  for(let i=0;i<count;i++){
    const viewport = document.createElement('div');
    viewport.className = 'reel-viewport';
    viewport.innerHTML = `
      <div class="reel-pointer"></div>
      <div class="reel-idle-msg">— press unbox to begin —</div>
      <div class="reel-track" id="reel-track-${i}"></div>
    `;
    container.appendChild(viewport);
  }
  currentReelRowCount = count;
}

function spinReelRow(rowIndex, finalRarity, finalName, durationMs){
  const track = document.getElementById('reel-track-'+rowIndex);
  const viewport = track.parentElement;
  viewport.classList.add('has-spun');
  track.style.transition = 'none';
  track.innerHTML = '';
  track.classList.add('spinning');

  const totalCards = 34;
  const winIndex = totalCards - 6;
  const cards = [];
  for(let i=0;i<totalCards;i++){
    cards.push(i === winIndex ? { rarity: finalRarity, name: finalName } : fillerCard());
  }
  cards.forEach((c,i)=> track.appendChild(buildCardEl(c, i===winIndex)));

  const viewportWidth = viewport.clientWidth;
  const targetCenter = winIndex*SLOT + ITEM_W/2;
  const jitter = (Math.random()*0.5-0.25) * (ITEM_W*0.4);
  const finalX = (viewportWidth/2) - targetCenter + jitter;

  track.style.transform = `translateX(40px)`;
  void track.offsetWidth;
  track.style.transition = `transform ${durationMs}ms cubic-bezier(0.09,0.85,0.15,1)`;
  track.style.transform = `translateX(${finalX}px)`;

  setTimeout(()=>{ track.classList.remove('spinning'); }, durationMs);
}

const ring = document.getElementById('ring-fill');
const RING_R = 72;
const RING_CIRC = 2*Math.PI*RING_R;
ring.style.strokeDasharray = `${RING_CIRC}`;
ring.style.strokeDashoffset = `0`;

function runCooldown(ms){
  cooldownActive = true;
  const btn = document.getElementById('unbox-btn');
  const cdText = document.getElementById('cd-text');
  btn.disabled = true;
  const start = performance.now();

  function step(now){
    const elapsed = now - start;
    const pct = Math.min(1, elapsed/ms);
    ring.style.strokeDashoffset = `${RING_CIRC * pct}`;
    const remain = Math.max(0, (ms - elapsed)/1000);
    cdText.textContent = pct < 1 ? remain.toFixed(1)+'s' : '';
    if(pct < 1){
      cooldownRAF = requestAnimationFrame(step);
    } else {
      cooldownActive = false;
      btn.disabled = false;
      cdText.textContent = '';
      ring.style.strokeDashoffset = `0`;
      if(state.autoUnbox){
        doUnbox();
      }
    }
  }
  cooldownRAF = requestAnimationFrame(step);
}

function doUnbox(){
  if(cooldownActive) return;
  const pool = rarityPool();
  if(pool.length === 0){
    document.getElementById('result-line').innerHTML =
      `<span style="color:var(--danger)">No items configured yet — add names to CONFIG.items in the source.</span>`;
    return;
  }
  playPop();
  const rarity = weightedPickRarity();
  const name = pickItem(rarity);

  spinReel(rarity, name, CONFIG.cooldownMs);
  runCooldown(CONFIG.cooldownMs);

  setTimeout(()=>{
    revealResult(rarity, name);
  }, CONFIG.cooldownMs);
}

function revealResult(rarity, name){
  state.total += 1;
  state.rarityCounts[rarity.key] = (state.rarityCounts[rarity.key]||0) + 1;
  state.itemCounts[name] = (state.itemCounts[name]||0) + 1;
  saveState();

  updateTotalDisplay();
  addHistoryChip(rarity, name);
  renderRarityList();

  const resultLine = document.getElementById('result-line');
  resultLine.classList.remove('show'); void resultLine.offsetWidth;
  resultLine.innerHTML = `You unboxed <span class="r-name" style="color:${rarity.color}">${escapeHtml(name)}</span> — <span style="color:${rarity.color}">${rarity.label}</span>`;
  resultLine.classList.add('show');

  playReveal(rarity.fx);
  if(rarity.fx >= 1){
    spawnParticles(rarity.color, rarity.fx === 3 ? 46 : rarity.fx === 2 ? 30 : 14);
  }
  if(rarity.fx >= 2){
    screenFlash(rarity.color === 'var(--c-niche)' ? '#ffffff' : rarity.color);
  }
  if(rarity.fx >= 3){
    screenShake();
    spawnParticles('#ff2ec4', 14);
    spawnParticles('#2f8fff', 14);
    spawnParticles('#f2c14e', 14);
  }

  checkAutoUnlock();
}

function addHistoryChip(rarity, name){
  const row = document.getElementById('history-row');
  const chip = document.createElement('div');
  chip.className = 'hist-chip';
  chip.style.color = rarity.color;
  chip.style.borderColor = rarity.color+'55';
  chip.textContent = `${name} · ${rarity.label}`;
  row.prepend(chip);
  while(row.children.length > 25){ row.removeChild(row.lastChild); }
}

function updateTotalDisplay(){
  document.getElementById('total-count').textContent = fmtNum(state.total);
}

function checkAutoUnlock(){
  const btn = document.getElementById('auto-toggle');
  const hint = document.getElementById('auto-hint');
  if(state.total >= CONFIG.autoUnboxUnlockAt){
    btn.style.display = 'flex';
    hint.textContent = '';
  } else {
    const remain = CONFIG.autoUnboxUnlockAt - state.total;
    hint.textContent = `Auto-Unbox unlocks in ${remain} more unbox${remain===1?'':'es'}`;
  }
}
document.getElementById('auto-toggle').addEventListener('click', ()=>{
  state.autoUnbox = !state.autoUnbox;
  saveState();
  renderAutoToggle();
  if(state.autoUnbox && !cooldownActive){
    doUnbox();
  }
});
function renderAutoToggle(){
  const btn = document.getElementById('auto-toggle');
  btn.classList.toggle('on', state.autoUnbox);
  btn.innerHTML = `<span class="dot"></span> Auto-Unbox: ${state.autoUnbox ? 'ON' : 'OFF'}`;
}

// Which rarity rows are expanded, tracked outside the DOM. renderRarityList()
// used to rebuild the whole list from scratch on every unbox (including during
// auto-unbox), which nuked every row back to freshly-built = closed — that was
// the "index keeps closing itself" bug. Now open/closed state lives here and
// gets reapplied after every rebuild instead of being lost.
const openRarityKeys = new Set();

function renderRarityList(){
  const all = getEffectiveRarities();
  const totalAll = totalWeight(all);
  const list = document.getElementById('rarity-list');
  list.innerHTML = '';
  all.forEach(r=>{
    const items = CONFIG.items[r.key] || [];
    const chance = fmtChance(r.weight, totalAll);
    const shimmerClass = r.rainbow ? 'rainbow-border' : (r.foil ? 'foil-border' : '');
    const swatchStyle = shimmerClass ? '' : `background:${r.color}; box-shadow:0 0 8px ${r.color}99;`;
    const barStyle = shimmerClass ? '' : `background:${r.color};`;
    const nameColor = (r.key === 'niche') ? 'var(--text)' : r.color;
    const row = document.createElement('div');
    row.className = 'rarity-row';
    const isOpen = openRarityKeys.has(r.key);
    row.innerHTML = `
      <div class="rarity-row-head">
        <div class="chip ${shimmerClass}" style="${swatchStyle}"></div>
        <div class="rname" style="color:${nameColor}">${r.label}</div>
        <div class="rbar"><div class="rbar-fill ${shimmerClass}" style="width:${Math.max(0.4, (r.weight/totalAll)*100)}%; ${barStyle}"></div></div>
        <div class="rchance">${chance}</div>
        <div class="rcount">${items.length} item${items.length===1?'':'s'}</div>
        <div class="chev">▾</div>
      </div>
      <div class="rarity-items">
        <div class="rarity-items-inner">
          ${items.length ? items.map(n=>`<div class="item-tag">${escapeHtml(n)} <span class="cnt">${state.itemCounts[n]||0}</span></div>`).join('') : `<div class="item-tag empty">no names added yet — rolls of ${r.label} currently cascade down to the next filled tier</div>`}
        </div>
      </div>
    `;
    const inner = row.querySelector('.rarity-items');
    if(isOpen){
      row.classList.add('open');
      inner.style.maxHeight = inner.scrollHeight + 'px';
    }
    row.querySelector('.rarity-row-head').addEventListener('click', ()=>{
      const wasOpen = row.classList.contains('open');
      row.classList.toggle('open');
      inner.style.maxHeight = wasOpen ? '0px' : inner.scrollHeight+'px';
      if(wasOpen) openRarityKeys.delete(r.key); else openRarityKeys.add(r.key);
    });
    list.appendChild(row);
  });
}

document.getElementById('unbox-btn').addEventListener('click', doUnbox);

updateTotalDisplay();
renderAutoToggle();
checkAutoUnlock();
renderRarityList();
</script>
</body>
</html>
