<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DVC Clicker · Golden</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ─── RESET & ROOT ─── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #07070e;
            --surface: #0f0f1a;
            --surface2: #18182a;
            --surface3: #22223a;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.12);
            --fg: #f0f0f8;
            --muted: rgba(255,255,255,0.45);
            --primary: #7c5cfc;
            --primary-dim: rgba(124,92,252,0.12);
            --primary-glow: rgba(124,92,252,0.35);
            --gold: #ffc94a;
            --green: #39e58c;
            --red: #ff5d6c;
        }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

        /* ─── AUTH OVERLAY ─── */
        #authOverlay {
            position: fixed; inset: 0; z-index: 99999;
            background: radial-gradient(ellipse at 50% 30%, rgba(124,92,252,0.12), #07070e 70%);
            display: flex; align-items: center; justify-content: center; padding: 1.5rem;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #authOverlay.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }
        .auth-box {
            width: 100%; max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border2);
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }
        .auth-box::before {
            content: ''; position: absolute; top: -30%; right: -30%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--primary-glow), transparent 70%);
            opacity: 0.1; pointer-events: none;
        }
        .auth-box .auth-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem; font-weight: 700; text-align: center;
            letter-spacing: -0.5px; margin-bottom: 0.2rem; position: relative; z-index: 1;
        }
        .auth-box .auth-logo span { color: var(--primary); text-shadow: 0 0 30px var(--primary-glow); }
        .auth-box .auth-logo small {
            font-size: 0.6rem; font-weight: 400; color: var(--muted);
            letter-spacing: 1px; display: block; margin-top: 0.1rem;
        }
        .auth-box .auth-sub {
            text-align: center; font-size: 0.75rem; color: var(--muted);
            margin-bottom: 1.8rem; position: relative; z-index: 1;
        }
        .auth-tabs {
            display: flex; background: var(--surface2); border: 1px solid var(--border);
            padding: 3px; margin-bottom: 1.5rem; position: relative; z-index: 1;
        }
        .auth-tab {
            flex: 1; padding: 0.5rem; font-size: 0.8rem; font-weight: 600;
            color: var(--muted); background: transparent; border: none;
            cursor: pointer; transition: 0.25s ease; font-family: 'Manrope', sans-serif;
        }
        .auth-tab.active { background: var(--primary); color: #fff; box-shadow: 0 0 30px var(--primary-glow); }
        .auth-tab:hover:not(.active) { color: var(--fg); }
        .auth-form { display: flex; flex-direction: column; gap: 1rem; position: relative; z-index: 1; }
        .auth-form.hidden { display: none; }
        .auth-form .field { display: flex; flex-direction: column; gap: 4px; }
        .auth-form .field label {
            font-size: 0.7rem; font-weight: 600; color: var(--muted); letter-spacing: 0.5px;
        }
        .auth-form .field input {
            background: var(--surface2); border: 1px solid var(--border);
            padding: 0.7rem 1rem; color: var(--fg); font-size: 0.9rem;
            font-family: 'Manrope', sans-serif; transition: border-color 0.2s; width: 100%;
        }
        .auth-form .field input:focus { border-color: var(--primary); outline: none; }
        .auth-form .field input::placeholder { color: rgba(255,255,255,0.15); }
        .auth-error {
            font-size: 0.75rem; color: var(--red);
            background: rgba(255,93,108,0.08); padding: 0.5rem 0.8rem;
            border: 1px solid rgba(255,93,108,0.15); display: none;
        }
        .auth-error.show { display: block; }
        .auth-submit {
            background: var(--primary); color: #fff; border: none;
            padding: 0.8rem; font-size: 0.9rem; font-weight: 700;
            font-family: 'Manrope', sans-serif; cursor: pointer;
            transition: opacity 0.2s, transform 0.15s; margin-top: 0.3rem; width: 100%;
        }
        .auth-submit:hover { opacity: 0.88; transform: translateY(-1px); }
        .auth-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .auth-box .auth-demo {
            text-align: center; font-size: 0.6rem; color: var(--muted);
            margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);
            position: relative; z-index: 1; letter-spacing: 0.3px;
        }

        /* ─── GAME WRAPPER ─── */
        #gameRoot {
            width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 1.5rem;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(124,92,252,0.08), transparent 50%),
                              radial-gradient(ellipse at 80% 80%, rgba(255,201,74,0.04), transparent 50%);
        }
        #gameRoot.hidden { display: none; }

        .game {
            width: 100%; max-width: 1200px;
            background: var(--surface);
            border: 1px solid var(--border2);
            padding: 1.75rem 2rem 1.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
            max-height: 95vh;
            display: flex; flex-direction: column;
        }
        .game::before {
            content: ''; position: absolute; top: -20%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--primary-glow), transparent 70%);
            opacity: 0.15; pointer-events: none;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem;
            position: relative; z-index: 2; flex-shrink: 0;
        }
        .logo {
            display: flex; align-items: center; gap: 0.6rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px;
        }
        .logo span { color: var(--primary); text-shadow: 0 0 24px var(--primary-glow); }
        .logo small {
            font-size: 0.65rem; font-weight: 400; color: var(--muted);
            letter-spacing: 0.5px; background: rgba(255,255,255,0.04);
            padding: 0.15rem 0.8rem; border: 1px solid var(--border);
        }
        .header-right {
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
        }
        .stats {
            display: flex; gap: 0.8rem; flex-wrap: wrap;
        }
        .stat {
            background: var(--surface2); padding: 0.35rem 1rem;
            border: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.7rem; font-weight: 600; color: var(--muted);
        }
        .stat .val {
            color: var(--fg); font-family: 'Space Grotesk', monospace;
            font-size: 0.85rem;
        }
        .stat .val.gold { color: var(--gold); }
        .stat .val.green { color: var(--green); }
        .user-badge {
            display: flex; align-items: center; gap: 0.5rem;
            background: var(--primary-dim); border: 1px solid rgba(124,92,252,0.2);
            padding: 0.25rem 0.8rem 0.25rem 1rem;
            font-size: 0.75rem; font-weight: 600; color: var(--primary);
        }
        .user-badge .logout-btn {
            background: rgba(255,255,255,0.06); border: none;
            color: var(--muted); padding: 0.1rem 0.6rem;
            font-size: 0.6rem; cursor: pointer; font-weight: 600;
            transition: 0.2s; font-family: 'Manrope', sans-serif;
        }
        .user-badge .logout-btn:hover { color: var(--red); background: rgba(255,93,108,0.1); }

        /* ─── MAIN GRID ─── */
        .grid {
            display: grid; grid-template-columns: 1fr 340px;
            gap: 2rem; position: relative; z-index: 2;
            flex: 1; min-height: 0;
        }
        @media (max-width: 820px) {
            .grid { grid-template-columns: 1fr; }
            .game { padding: 1rem; max-height: none; overflow-y: auto; }
        }

        /* ─── CLICKER ─── */
        .clicker-col {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 0.5rem 0;
        }
        .clicker-wrap {
            position: relative; width: 220px; height: 220px;
            cursor: pointer; user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.08s ease;
        }
        .clicker-wrap:active { transform: scale(0.92); }
        .clicker-wrap .dvc {
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 30%, #34236a, #0d0a1a);
            border: 2px solid var(--primary);
            box-shadow: 0 0 50px rgba(124,92,252,0.25), inset 0 0 40px rgba(124,92,252,0.08);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.8rem; font-weight: 800; color: #fff;
            letter-spacing: 2px; text-shadow: 0 0 30px var(--primary-glow);
            transition: box-shadow 0.3s; position: relative;
        }
        .clicker-wrap .dvc:hover {
            box-shadow: 0 0 70px rgba(124,92,252,0.45), inset 0 0 40px rgba(124,92,252,0.15);
        }
        .clicker-wrap .dvc .sub {
            font-size: 0.6rem; font-weight: 600; letter-spacing: 2px;
            color: var(--gold); opacity: 0.7;
            background: rgba(0,0,0,0.4); padding: 2px 12px;
            border: 1px solid rgba(255,201,74,0.12); margin-top: -2px;
        }
        .clicker-wrap .ripple {
            position: absolute; inset: -4px;
            border: 2px solid var(--primary); opacity: 0;
            animation: rippleOut 0.7s ease-out forwards; pointer-events: none;
        }
        @keyframes rippleOut {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .clicker-wrap .part {
            position: absolute; pointer-events: none;
            font-size: 1.2rem; font-weight: 700; color: var(--gold);
            text-shadow: 0 0 16px var(--gold);
            animation: floatUp 0.9s ease-out forwards;
            font-family: 'Space Grotesk', monospace;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(0,0) scale(0.5); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.5); }
        }

        .clicker-stats {
            margin-top: 1.6rem; text-align: center; width: 100%;
        }
        .clicker-stats .total {
            font-family: 'Space Grotesk', monospace;
            font-size: 3.6rem; font-weight: 700; letter-spacing: -1px;
            background: linear-gradient(135deg, var(--gold), #ffb347);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; transition: transform 0.12s;
        }
        .clicker-stats .total.pop { animation: popNum 0.15s ease; }
        @keyframes popNum {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        .clicker-stats .label {
            font-size: 0.8rem; color: var(--muted);
            margin-top: 0.15rem; letter-spacing: 0.3px;
        }
        .clicker-stats .cps-badge {
            font-size: 0.85rem; color: var(--green); font-weight: 600;
            margin-top: 0.4rem; background: rgba(57,229,140,0.07);
            padding: 0.2rem 1.2rem; border: 1px solid rgba(57,229,140,0.12);
            display: inline-block;
        }

        /* ─── UPGRADE PANEL ─── */
        .panel-tabs {
            display: flex; border-bottom: 1px solid var(--border);
            margin-bottom: 0.75rem; flex-shrink: 0;
        }
        .panel-tabs button {
            background: transparent; border: none;
            color: var(--muted); font-weight: 600; font-size: 0.75rem;
            padding: 0.4rem 1rem; cursor: pointer; transition: 0.2s;
            font-family: 'Manrope', sans-serif; letter-spacing: 0.5px;
            border-bottom: 2px solid transparent;
        }
        .panel-tabs button.active { color: var(--fg); border-bottom-color: var(--primary); }
        .panel-tabs button:hover { color: var(--fg); }

        .upgrade-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.25rem;
            display: flex; flex-direction: column;
            max-height: 520px; min-height: 0;
        }
        .upgrade-panel .tab-content {
            flex: 1; overflow-y: auto; padding-right: 4px;
        }
        .upgrade-panel .tab-content.hidden { display: none; }
        .upgrade-panel .tab-content::-webkit-scrollbar { width: 3px; }
        .upgrade-panel .tab-content::-webkit-scrollbar-thumb { background: var(--primary); }

        .panel-head {
            font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted); font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem; flex-shrink: 0;
        }
        .panel-head span { color: var(--gold); font-size: 0.75rem; }

        .upgrade {
            background: var(--surface2); border: 1px solid var(--border);
            padding: 0.65rem 0.9rem;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.15s, border-color 0.15s;
            opacity: 0.5; pointer-events: none; cursor: default;
            margin-bottom: 0.3rem;
        }
        .upgrade.can { opacity: 1; pointer-events: auto; cursor: pointer; border-color: rgba(124,92,252,0.25); }
        .upgrade.can:hover { border-color: var(--primary); background: var(--surface3); }
        .upgrade .info { display: flex; flex-direction: column; gap: 1px; flex: 1; }
        .upgrade .info .name {
            font-weight: 700; font-size: 0.82rem;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .upgrade .info .name .owned {
            font-size: 0.55rem; font-weight: 500; color: var(--muted);
            background: rgba(255,255,255,0.05); padding: 0.05rem 0.45rem;
            border: 1px solid var(--border);
        }
        .upgrade .info .desc { font-size: 0.6rem; color: var(--muted); }
        .upgrade .right {
            display: flex; flex-direction: column;
            align-items: flex-end; gap: 0.1rem;
            flex-shrink: 0; margin-left: 0.8rem;
        }
        .upgrade .price {
            font-family: 'Space Grotesk', monospace;
            font-weight: 700; font-size: 0.78rem; color: var(--gold);
        }
        .upgrade .add { font-size: 0.6rem; color: var(--green); font-weight: 600; }

        /* ─── LEADERBOARD ─── */
        .lb-entry {
            display: flex; justify-content: space-between;
            padding: 0.4rem 0.2rem; border-bottom: 1px solid var(--border);
            font-size: 0.75rem; color: var(--muted);
        }
        .lb-entry .rank { font-weight: 700; color: var(--fg); width: 24px; }
        .lb-entry .name { flex: 1; margin-left: 0.5rem; font-weight: 600; color: var(--fg); }
        .lb-entry .score { font-family: 'Space Grotesk', monospace; color: var(--gold); }
        .lb-entry.me { background: var(--primary-dim); border-color: var(--primary); }

        /* ─── GOLDEN COOKIE ─── */
        .golden-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; overflow: hidden;
        }
        .golden-cookie {
            position: absolute; width: 70px; height: 70px;
            background: radial-gradient(circle at 30% 30%, #ffd966, #f0a500);
            border-radius: 50%; border: 3px solid #fff;
            box-shadow: 0 0 40px rgba(255,201,74,0.7), inset 0 -4px 8px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900; color: #7a4a00;
            cursor: pointer; pointer-events: auto;
            animation: goldenFloat 2s ease-in-out infinite;
            transition: transform 0.15s;
            text-shadow: 0 2px 4px rgba(255,215,0,0.3);
            font-family: 'Space Grotesk', sans-serif; user-select: none;
        }
        .golden-cookie::after {
            content: '✨'; position: absolute; top: -8px; right: -8px; font-size: 1rem;
        }
        .golden-cookie:hover { transform: scale(1.1); }
        @keyframes goldenFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        .golden-popup {
            position: fixed; pointer-events: none;
            font-size: 1.8rem; font-weight: 800; color: var(--gold);
            text-shadow: 0 0 30px var(--gold); z-index: 1000;
            animation: floatUpBig 1.2s ease-out forwards;
            font-family: 'Space Grotesk', monospace;
        }
        @keyframes floatUpBig {
            0% { opacity: 1; transform: translate(0,0) scale(0.6); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.8); }
        }

        /* ─── FOOTER ─── */
        .footer {
            margin-top: 1.5rem; padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between;
            font-size: 0.65rem; color: var(--muted);
            flex-wrap: wrap; gap: 0.6rem;
            position: relative; z-index: 2; flex-shrink: 0;
        }
        .footer .reset {
            background: rgba(255,93,108,0.08);
            border: 1px solid rgba(255,93,108,0.18);
            padding: 0.2rem 1rem; color: var(--red);
            font-size: 0.65rem; font-weight: 600; cursor: pointer;
            transition: 0.2s; font-family: 'Manrope', sans-serif;
        }
        .footer .reset:hover { background: rgba(255,93,108,0.16); }

        /* ─── TOAST ─── */
        .toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface2); border: 1px solid var(--border2);
            padding: 0.6rem 2rem; font-weight: 600; font-size: 0.85rem;
            color: var(--fg); box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            opacity: 0; transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none; z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 500px) {
            .game { padding: 1rem; max-height: none; }
            .clicker-wrap { width: 170px; height: 170px; }
            .clicker-wrap .dvc { font-size: 3rem; }
            .clicker-stats .total { font-size: 2.6rem; }
            .stats { gap: 0.4rem; }
            .stat { padding: 0.2rem 0.6rem; font-size: 0.6rem; }
            .stat .val { font-size: 0.7rem; }
            .grid { gap: 1.2rem; }
            .golden-cookie { width: 55px; height: 55px; font-size: 1.6rem; }
            .auth-box { padding: 1.8rem 1.2rem; }
            .auth-box .auth-logo { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- ═══ AUTH OVERLAY ═══ -->
    <div id="authOverlay">
        <div class="auth-box">
            <div class="auth-logo">DVC<span>Clicker</span><small>golden</small></div>
            <div class="auth-sub">Sign in to save your progress</div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Log In</button>
                <button class="auth-tab" data-tab="signup" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>
            <form class="auth-form" id="loginForm" onsubmit="event.preventDefault(); doLogin();">
                <div class="field"><label>Username</label><input id="loginUser" type="text" placeholder="Enter username" autocomplete="username" /></div>
                <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password" /></div>
                <div class="auth-error" id="loginError"></div>
                <button class="auth-submit" id="loginBtn" type="submit">Log In</button>
            </form>
            <form class="auth-form hidden" id="signupForm" onsubmit="event.preventDefault(); doSignup();">
                <div class="field"><label>Username</label><input id="signupUser" type="text" placeholder="Choose a username" autocomplete="username" /></div>
                <div class="field"><label>Password</label><input id="signupPass" type="password" placeholder="Choose a password" autocomplete="new-password" /></div>
                <div class="field"><label>Confirm Password</label><input id="signupPass2" type="password" placeholder="Confirm password" autocomplete="new-password" /></div>
                <div class="auth-error" id="signupError"></div>
                <button class="auth-submit" id="signupBtn" type="submit">Create Account</button>
            </form>
            <div class="auth-demo">🔒 All data stored locally in your browser</div>
        </div>
    </div>

    <!-- ═══ GAME ROOT ═══ -->
    <div id="gameRoot" class="hidden">
        <div class="game">
            <div class="header">
                <div class="logo">DVC<span>Clicker</span><small>golden</small></div>
                <div class="header-right">
                    <div class="stats">
                        <div class="stat">🍪 CPS <span class="val green" id="cpsDisplay">0.0</span></div>
                        <div class="stat">🖱️ Clicks <span class="val gold" id="totalClicksDisplay">0</span></div>
                        <div class="stat">📦 <span class="val" id="upgradeCountDisplay">0</span></div>
                    </div>
                    <div class="user-badge"><span id="usernameDisplay">user</span><button class="logout-btn" onclick="logout()">✕</button></div>
                </div>
            </div>
            <div class="grid">
                <div class="clicker-col">
                    <div class="clicker-wrap" id="clicker"><div class="dvc">DVC<span class="sub">College</span></div></div>
                    <div class="clicker-stats">
                        <div class="total" id="cookieCount">0</div>
                        <div class="label">DVC tokens</div>
                        <div class="cps-badge" id="cpsLabel">+0.0 / sec</div>
                    </div>
                </div>
                <div class="upgrade-panel">
                    <div class="panel-tabs">
                        <button class="active" data-tab="upgrades">⬆ Upgrades</button>
                        <button data-tab="leaderboard">🏆 Leaderboard</button>
                    </div>
                    <div class="tab-content" id="tabUpgrades">
                        <div class="panel-head">🛠️ Purchases <span id="upgradeCount">0</span></div>
                        <div id="upgradeList"></div>
                    </div>
                    <div class="tab-content hidden" id="tabLeaderboard">
                        <div class="panel-head">🏆 Top Scores</div>
                        <div id="leaderboardList"></div>
                    </div>
                </div>
            </div>
            <div class="footer">
                <span>© DVC Clicker · <span id="footerUsername">user</span></span>
                <button class="reset" id="resetBtn">⟳ Reset</button>
            </div>
        </div>
    </div>

    <!-- GOLDEN CONTAINER -->
    <div class="golden-container" id="goldenContainer"></div>
    <div class="toast" id="toast"></div>

    <script>
        /* ================================================================
           DVC CLICKER — FIXED & STABLE
           ================================================================ */

        // ─── CONSTANTS ───
        const AUTH_KEY = 'dvcAuthUsers';
        const SESSION_KEY = 'dvcSession';
        const LB_KEY = 'dvcLB';

        // ─── AUTH HELPERS ───
        function getUsers() {
            try { return JSON.parse(localStorage.getItem(AUTH_KEY)) || {}; }
            catch (_) { return {}; }
        }
        function saveUsers(users) {
            localStorage.setItem(AUTH_KEY, JSON.stringify(users));
        }
        function getSession() {
            return localStorage.getItem(SESSION_KEY) || null;
        }
        function setSession(username) {
            localStorage.setItem(SESSION_KEY, username);
        }
        function clearSession() {
            localStorage.removeItem(SESSION_KEY);
        }
        function getUserData(username) {
            const users = getUsers();
            return users[username] || null;
        }
        function saveUserData(username, data) {
            const users = getUsers();
            users[username] = data;
            saveUsers(users);
        }

        // ─── LEADERBOARD ───
        let leaderboard = [];
        function loadLeaderboard() {
            try { leaderboard = JSON.parse(localStorage.getItem(LB_KEY)) || []; }
            catch (_) { leaderboard = []; }
        }
        function saveLeaderboard() {
            leaderboard.sort((a,b) => b.cookies - a.cookies);
            if (leaderboard.length > 50) leaderboard = leaderboard.slice(0,50);
            localStorage.setItem(LB_KEY, JSON.stringify(leaderboard));
        }
        function addLeaderboardEntry() {
            const username = getSession();
            if (!username) return;
            leaderboard = leaderboard.filter(e => e.name !== username);
            leaderboard.push({
                name: username,
                cookies: S.cookies,
                clicks: S.totalClicks,
                cps: getTotalCPS(),
                date: Date.now()
            });
            saveLeaderboard();
            renderLeaderboard();
        }
        function renderLeaderboard() {
            const list = document.getElementById('leaderboardList');
            if (!list) return;
            const username = getSession();
            if (leaderboard.length === 0) {
                list.innerHTML = '<div style="color:var(--muted);padding:1rem 0;font-size:0.8rem;">No scores yet. Keep clicking!</div>';
                return;
            }
            let html = '';
            const top = leaderboard.slice(0,10);
            top.forEach((entry, i) => {
                const rank = i+1;
                const medals = ['🥇','🥈','🥉'];
                const rankDisplay = rank <=3 ? medals[i] : `#${rank}`;
                const isMe = entry.name === username;
                html += `<div class="lb-entry ${isMe ? 'me' : ''}">
                    <span class="rank">${rankDisplay}</span>
                    <span class="name">${entry.name} ${isMe ? '👈' : ''}</span>
                    <span class="score">🍪 ${formatNumber(entry.cookies)}</span>
                </div>`;
            });
            list.innerHTML = html;
        }

        // ─── GAME STATE ───
        const S = { cookies: 0, totalClicks: 0, upgrades: {} };

        // ─── UPGRADE DEFINITIONS ───
        const UPGRADES = [
            { id: 'cursor', name: '🖱️ Cursor', desc: 'Auto-click every second', baseCost: 15, cps: 0.2, mult: 1.15, max: 100 },
            { id: 'grandma', name: '👵 Grandma', desc: 'Bakes cookies with love', baseCost: 100, cps: 1, mult: 1.15, max: 80 },
            { id: 'farm', name: '🌾 Farm', desc: 'Harvest fresh cookies', baseCost: 500, cps: 4, mult: 1.14, max: 60 },
            { id: 'mine', name: '⛏️ Mine', desc: 'Dig up cookie ore', baseCost: 3000, cps: 12, mult: 1.13, max: 50 },
            { id: 'factory', name: '🏭 Factory', desc: 'Mass-produce cookies', baseCost: 15000, cps: 40, mult: 1.12, max: 40 },
            { id: 'portal', name: '🌀 Portal', desc: 'Summon cookies from elsewhere', baseCost: 80000, cps: 150, mult: 1.10, max: 30 },
            { id: 'time', name: '⏳ Time Machine', desc: 'Bake cookies from the future', baseCost: 400000, cps: 500, mult: 1.08, max: 20 },
            { id: 'antimatter', name: '⚛️ Antimatter', desc: 'Annihilate into cookies', baseCost: 2000000, cps: 2000, mult: 1.07, max: 15 },
            { id: 'universe', name: '🌌 Universe', desc: 'Create a cookie universe', baseCost: 10000000, cps: 8000, mult: 1.06, max: 10 },
        ];

        // ─── HELPERS ───
        function getCost(u) {
            const owned = S.upgrades[u.id] || 0;
            if (owned >= u.max) return Infinity;
            return Math.floor(u.baseCost * Math.pow(u.mult, owned));
        }
        function getTotalCPS() {
            let t = 0;
            for (const u of UPGRADES) t += (S.upgrades[u.id] || 0) * u.cps;
            return t;
        }
        function getTotalUpgrades() {
            let c = 0;
            for (const u of UPGRADES) c += (S.upgrades[u.id] || 0);
            return c;
        }
        function formatNumber(n) {
            if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
            if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
            return Math.floor(n).toString();
        }

        // ─── UPGRADE UI ───
        const upgradeList = document.getElementById('upgradeList');
        let upgradeElements = {};

        function buildUpgradeList() {
            upgradeList.innerHTML = '';
            for (const u of UPGRADES) {
                const div = document.createElement('div');
                div.className = 'upgrade';
                div.dataset.id = u.id;
                div.innerHTML = `
                    <div class="info">
                        <span class="name">${u.name} <span class="owned">0</span></span>
                        <span class="desc">${u.desc}</span>
                    </div>
                    <div class="right">
                        <div class="price">🍪 ${formatNumber(u.baseCost)}</div>
                        <div class="add">+${u.cps} CPS</div>
                    </div>
                `;
                upgradeList.appendChild(div);
                upgradeElements[u.id] = div;
            }
            upgradeList.addEventListener('click', function(e) {
                const item = e.target.closest('.upgrade');
                if (!item) return;
                if (!item.classList.contains('can')) return;
                purchase(item.dataset.id);
            });
        }

        function updateUpgradeList() {
            for (const u of UPGRADES) {
                const el = upgradeElements[u.id];
                if (!el) continue;
                const owned = S.upgrades[u.id] || 0;
                const cost = getCost(u);
                const can = S.cookies >= cost && owned < u.max;
                el.querySelector('.owned').textContent = owned;
                el.querySelector('.price').innerHTML = cost === Infinity ? 'MAX' : '🍪 ' + formatNumber(cost);
                const addEl = el.querySelector('.add');
                if (owned < u.max) {
                    addEl.textContent = '+' + u.cps + ' CPS';
                    addEl.style.display = '';
                } else {
                    addEl.style.display = 'none';
                }
                el.classList.toggle('can', can);
            }
            document.getElementById('upgradeCount').textContent = getTotalUpgrades();
            document.getElementById('upgradeCountDisplay').textContent = getTotalUpgrades();
        }

        // ─── PURCHASE ───
        let _purchasing = false;
        function purchase(id) {
            if (_purchasing) return;
            const u = UPGRADES.find(x => x.id === id);
            if (!u) return;
            const cost = getCost(u);
            if (S.cookies < cost) return;
            _purchasing = true;
            S.cookies -= cost;
            S.upgrades[id] = (S.upgrades[id] || 0) + 1;
            updateUI();
            saveGame();
            addLeaderboardEntry();
            showToast(`✅ ${u.name} purchased!`);
            setTimeout(() => { _purchasing = false; }, 120);
        }

        // ─── CLICK ───
        function handleClick(e) {
            const el = document.getElementById('clicker');
            // Ripple
            const rip = document.createElement('div');
            rip.className = 'ripple';
            el.appendChild(rip);
            setTimeout(() => rip.remove(), 700);
            // Particle
            const rect = el.getBoundingClientRect();
            const cx = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left;
            const cy = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top;
            const p = document.createElement('div');
            p.className = 'part';
            const cursorBoost = (S.upgrades['cursor'] || 0) * 0.1;
            const gain = 1 + cursorBoost;
            p.textContent = '+' + (gain >= 1 ? gain.toFixed(1) : '1');
            const angle = Math.random() * 2 * Math.PI;
            const dist = 45 + Math.random() * 65;
            p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--ty', Math.sin(angle) * dist - 45 + 'px');
            p.style.left = cx + 'px';
            p.style.top = cy + 'px';
            el.appendChild(p);
            setTimeout(() => p.remove(), 900);
            // Gain
            S.cookies += gain;
            S.totalClicks++;
            updateUI();
            saveGame();
            addLeaderboardEntry();
        }

        // ─── GOLDEN COOKIE ───
        let goldenScheduled = false;
        let goldenTimeout = null;

        function spawnGoldenCookie() {
            const container = document.getElementById('goldenContainer');
            const el = document.createElement('div');
            el.className = 'golden-cookie';
            el.style.left = (5 + Math.random() * 80) + '%';
            el.style.top = (10 + Math.random() * 75) + '%';
            el.textContent = '🍪';
            const cps = getTotalCPS();
            const reward = Math.max(50, Math.floor(cps * 12 + 150));
            el.dataset.reward = reward;
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                const rewardAmt = parseInt(this.dataset.reward) || 100;
                S.cookies += rewardAmt;
                S.totalClicks += 1;
                updateUI();
                saveGame();
                showGoldenPopup(e.clientX, e.clientY, `+${formatNumber(rewardAmt)} 🍪`);
                this.remove();
                showToast(`✨ Golden cookie! +${formatNumber(rewardAmt)} tokens`);
                addLeaderboardEntry();
                scheduleGolden();
            });
            container.appendChild(el);
            setTimeout(() => {
                if (el.parentNode) { el.remove(); scheduleGolden(); }
            }, 15000);
        }

        function showGoldenPopup(x, y, text) {
            const el = document.createElement('div');
            el.className = 'golden-popup';
            el.textContent = text;
            const angle = Math.random() * 2 * Math.PI;
            const dist = 80 + Math.random() * 120;
            el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            el.style.setProperty('--ty', Math.sin(angle) * dist - 100 + 'px');
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function scheduleGolden() {
            if (goldenScheduled) return;
            goldenScheduled = true;
            const delay = 8000 + Math.random() * 22000;
            clearTimeout(goldenTimeout);
            goldenTimeout = setTimeout(() => {
                goldenScheduled = false;
                const existing = document.querySelectorAll('.golden-cookie');
                if (existing.length < 2) spawnGoldenCookie();
                scheduleGolden();
            }, delay);
        }

        // ─── UI UPDATE ───
        function updateUI() {
            const cps = getTotalCPS();
            const el = document.getElementById('cookieCount');
            el.textContent = formatNumber(S.cookies);
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
            document.getElementById('cpsDisplay').textContent = cps.toFixed(1);
            document.getElementById('cpsLabel').textContent = '+' + cps.toFixed(1) + ' / sec';
            document.getElementById('totalClicksDisplay').textContent = S.totalClicks;
            updateUpgradeList();
            // Update leaderboard if visible
            const lbTab = document.getElementById('tabLeaderboard');
            if (!lbTab.classList.contains('hidden')) renderLeaderboard();
        }

        // ─── SAVE / LOAD ───
        function saveGame() {
            const username = getSession();
            if (!username) return;
            const userData = getUserData(username);
            if (!userData) return;
            userData.gameData = {
                cookies: S.cookies,
                totalClicks: S.totalClicks,
                upgrades: S.upgrades
            };
            saveUserData(username, userData);
        }

        function loadGame() {
            const username = getSession();
            if (!username) return false;
            const userData = getUserData(username);
            if (userData && userData.gameData) {
                S.cookies = userData.gameData.cookies || 0;
                S.totalClicks = userData.gameData.totalClicks || 0;
                S.upgrades = userData.gameData.upgrades || {};
                return true;
            }
            return false;
        }

        // ─── AUTH UI ───
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('signupError').classList.remove('show');
        }

        function showAuthError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }

        function setAuthLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) { btn.disabled = true; btn.textContent = '...'; }
            else { btn.disabled = false; btn.textContent = btnId === 'loginBtn' ? 'Log In' : 'Create Account'; }
        }

        function doLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            hideAuthErrors();
            if (!username) { showAuthError('loginError', 'Enter a username'); return; }
            if (!password) { showAuthError('loginError', 'Enter a password'); return; }
            const users = getUsers();
            if (!users[username]) { showAuthError('loginError', 'Account not found. Please sign up.'); return; }
            if (users[username].password !== password) { showAuthError('loginError', 'Wrong password.'); return; }
            setAuthLoading('loginBtn', true);
            setTimeout(() => {
                setAuthLoading('loginBtn', false);
                completeAuth(username);
            }, 400);
        }

        function doSignup() {
            const username = document.getElementById('signupUser').value.trim();
            const password = document.getElementById('signupPass').value;
            const password2 = document.getElementById('signupPass2').value;
            hideAuthErrors();
            if (!username || username.length < 2) { showAuthError('signupError', 'Username must be at least 2 characters.'); return; }
            if (username.length > 20) { showAuthError('signupError', 'Username too long (max 20).'); return; }
            if (!/^[a-zA-Z0-9_\-]+$/.test(username)) { showAuthError('signupError', 'Only letters, numbers, _ and - allowed.'); return; }
            if (!password || password.length < 3) { showAuthError('signupError', 'Password must be at least 3 characters.'); return; }
            if (password !== password2) { showAuthError('signupError', 'Passwords do not match.'); return; }
            const users = getUsers();
            if (users[username]) { showAuthError('signupError', 'Username already taken.'); return; }
            users[username] = { password, gameData: { cookies: 0, totalClicks: 0, upgrades: {} } };
            saveUsers(users);
            setAuthLoading('signupBtn', true);
            setTimeout(() => {
                setAuthLoading('signupBtn', false);
                showToast('✅ Account created! Welcome ' + username);
                completeAuth(username);
            }, 400);
        }

        function hideAuthErrors() {
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('signupError').classList.remove('show');
        }

        // ─── COMPLETE AUTH ───
        function completeAuth(username) {
            setSession(username);
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('gameRoot').classList.remove('hidden');

            // Load game data
            const loaded = loadGame();
            if (!loaded) {
                S.cookies = 0;
                S.totalClicks = 0;
                S.upgrades = {};
                for (const u of UPGRADES) S.upgrades[u.id] = 0;
            }
            // Ensure all upgrades exist
            for (const u of UPGRADES) {
                if (!(u.id in S.upgrades)) S.upgrades[u.id] = 0;
            }

            // Reset leaderboard to only current user (fresh start)
            leaderboard = [];
            addLeaderboardEntry();

            // Update UI
            document.getElementById('usernameDisplay').textContent = username;
            document.getElementById('footerUsername').textContent = username;
            updateUI();
            renderLeaderboard();
            showToast('🍪 Welcome back, ' + username + '!');

            // Start game systems
            if (!gameStarted) {
                gameStarted = true;
                scheduleGolden();
                requestAnimationFrame(loop);
            }
        }

        // ─── LOGOUT ───
        function logout() {
            if (!confirm('Log out? Your progress will be saved.')) return;
            saveGame();
            clearSession();
            document.getElementById('gameRoot').classList.add('hidden');
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
            document.getElementById('loginError').classList.remove('show');
            S.cookies = 0; S.totalClicks = 0; S.upgrades = {};
            updateUI();
            document.querySelectorAll('.golden-cookie').forEach(el => el.remove());
            showToast('Logged out.');
        }

        // ─── RESET ───
        function resetGame() {
            if (!confirm('Reset all progress for this account?')) return;
            S.cookies = 0;
            S.totalClicks = 0;
            S.upgrades = {};
            for (const u of UPGRADES) S.upgrades[u.id] = 0;
            saveGame();
            document.querySelectorAll('.golden-cookie').forEach(el => el.remove());
            updateUI();
            addLeaderboardEntry();
            showToast('↻ Reset complete.');
        }

        // ─── TOAST ───
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._h);
            t._h = setTimeout(() => t.classList.remove('show'), 2400);
        }

        // ─── TABS ───
        function initTabs() {
            const buttons = document.querySelectorAll('.panel-tabs button');
            const contents = {
                upgrades: document.getElementById('tabUpgrades'),
                leaderboard: document.getElementById('tabLeaderboard')
            };
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const tab = this.dataset.tab;
                    Object.keys(contents).forEach(key => {
                        contents[key].classList.toggle('hidden', key !== tab);
                    });
                    if (tab === 'leaderboard') {
                        loadLeaderboard();
                        renderLeaderboard();
                    }
                });
            });
        }

        // ─── GAME LOOP ───
        let gameStarted = false;
        let _last = 0;

        function loop(ts) {
            if (!_last) _last = ts;
            const delta = (ts - _last) / 1000;
            if (delta >= 0.1) {
                const cps = getTotalCPS();
                if (cps > 0) {
                    S.cookies += cps * delta;
                    updateUI();
                    saveGame();
                    // Update leaderboard periodically
                    addLeaderboardEntry();
                }
                _last = ts;
            }
            requestAnimationFrame(loop);
        }

        // ─── SAVE ON UNLOAD ───
        window.addEventListener('beforeunload', () => {
            if (getSession()) saveGame();
        });

        // ─── INIT ───
        function init() {
            buildUpgradeList();
            loadLeaderboard();

            // Check session
            const sessionUser = getSession();
            if (sessionUser) {
                const users = getUsers();
                if (users[sessionUser]) {
                    document.getElementById('loginUser').value = sessionUser;
                    completeAuth(sessionUser);
                } else {
                    clearSession();
                    document.getElementById('authOverlay').classList.remove('hidden');
                    document.getElementById('gameRoot').classList.add('hidden');
                }
            } else {
                document.getElementById('authOverlay').classList.remove('hidden');
                document.getElementById('gameRoot').classList.add('hidden');
            }

            // Event listeners
            document.getElementById('clicker').addEventListener('click', handleClick);
            document.getElementById('clicker').addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleClick(e);
            }, { passive: false });
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            initTabs();

            // Auto-save every 10 seconds
            setInterval(() => {
                if (getSession()) saveGame();
            }, 10000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
