<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVC Clicker · Cookie Clicker Remake</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & ROOT ─── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f17;
      --surface: #1a1a26;
      --surface2: #25253a;
      --surface3: #32324a;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.12);
      --fg: #f0f0f8;
      --muted: rgba(255,255,255,0.45);
      --primary: #7c5cfc;
      --primary-glow: rgba(124,92,252,0.35);
      --gold: #ffc94a;
      --green: #39e58c;
      --red: #ff5d6c;
      --radius: 16px;
      --transition: 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    /* ─── LAYOUT ─── */
    .game-wrapper {
      width: 100%;
      max-width: 1100px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 28px;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(2px);
    }
    .game-wrapper::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--primary-glow), transparent 70%);
      opacity: 0.25;
      pointer-events: none;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--primary); }
    .logo small {
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-left: 0.3rem;
    }
    .stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stat-item {
      background: var(--surface2);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
    }
    .stat-item .value {
      color: var(--fg);
      font-family: 'Space Grotesk', monospace;
      font-size: 0.95rem;
    }
    .stat-item .value.gold { color: var(--gold); }
    .stat-item .value.green { color: var(--green); }

    /* ─── MAIN AREA ─── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      position: relative;
      z-index: 1;
    }
    @media (max-width: 700px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    /* ─── CLICKER ─── */
    .clicker-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 0;
    }
    .clicker-container {
      position: relative;
      width: 220px;
      height: 220px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease;
    }
    .clicker-container:active {
      transform: scale(0.92);
    }
    .clicker-container .dvc-logo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #2a1f4a, #150f2a);
      border: 3px solid var(--primary);
      box-shadow: 0 0 30px rgba(124,92,252,0.25), inset 0 0 30px rgba(124,92,252,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.8rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 0 20px var(--primary-glow);
      transition: box-shadow 0.3s;
      position: relative;
    }
    .clicker-container .dvc-logo::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
    }
    .clicker-container .dvc-logo .sub {
      position: absolute;
      bottom: 18%;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--gold);
      opacity: 0.7;
      background: rgba(0,0,0,0.3);
      padding: 2px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,201,74,0.15);
    }
    .clicker-container .ripple {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid var(--primary);
      opacity: 0;
      animation: rippleOut 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleOut {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .clicker-container .particle {
      position: absolute;
      pointer-events: none;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold);
      animation: floatUp 0.9s ease-out forwards;
      font-family: 'Space Grotesk', monospace;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translate(0,0) scale(0.5); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.4); }
    }

    .clicker-stats {
      margin-top: 1.5rem;
      text-align: center;
    }
    .clicker-stats .total {
      font-family: 'Space Grotesk', monospace;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--gold), #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: transform 0.15s;
    }
    .clicker-stats .total.pop {
      animation: popNum 0.15s ease;
    }
    @keyframes popNum {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .clicker-stats .subtext {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .clicker-stats .cps {
      font-size: 0.8rem;
      color: var(--green);
      font-weight: 600;
      margin-top: 0.3rem;
    }

    /* ─── UPGRADE PANEL ─── */
    .upgrade-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      max-height: 540px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .upgrade-panel::-webkit-scrollbar { width: 3px; }
    .upgrade-panel .panel-title {
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
      font-weight: 600;
    }
    .upgrade-item {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all var(--transition);
      opacity: 0.7;
      pointer-events: none;
    }
    .upgrade-item.available {
      opacity: 1;
      pointer-events: auto;
    }
    .upgrade-item.available:hover {
      border-color: var(--primary);
      background: var(--surface);
      transform: translateX(3px);
      box-shadow: 0 0 20px rgba(124,92,252,0.08);
    }
    .upgrade-item .info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .upgrade-item .info .name {
      font-weight: 700;
      font-size: 0.85rem;
    }
    .upgrade-item .info .desc {
      font-size: 0.7rem;
      color: var(--muted);
    }
    .upgrade-item .price {
      font-family: 'Space Grotesk', monospace;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--gold);
      white-space: nowrap;
    }
    .upgrade-item .owned {
      font-size: 0.7rem;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 0.1rem 0.5rem;
      border-radius: 12px;
      margin-left: 0.5rem;
    }

    /* ─── FOOTER ─── */
    .footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .footer .reset-btn {
      background: rgba(255,93,108,0.12);
      border: 1px solid rgba(255,93,108,0.2);
      border-radius: 6px;
      padding: 0.2rem 0.8rem;
      color: var(--red);
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .footer .reset-btn:hover {
      background: rgba(255,93,108,0.2);
    }
    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 0.7rem 1.8rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--fg);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      DVC<span>Clicker</span>
      <small>· Cookie Clicker remake</small>
    </div>
    <div class="stats">
      <div class="stat-item">🍪 Per second <span class="value green" id="cpsDisplay">0.0</span></div>
      <div class="stat-item">⚡ Total clicks <span class="value gold" id="totalClicksDisplay">0</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-grid">
    <!-- Left: Clicker -->
    <div class="clicker-area">
      <div class="clicker-container" id="clicker">
        <div class="dvc-logo">
          DVC
          <span class="sub">College</span>
        </div>
      </div>
      <div class="clicker-stats">
        <div class="total" id="cookieCount">0</div>
        <div class="subtext">DVC tokens</div>
        <div class="cps" id="cpsLabel">0.0 / sec</div>
      </div>
    </div>

    <!-- Right: Upgrades -->
    <div class="upgrade-panel" id="upgradePanel">
      <div class="panel-title">🛠️ Upgrades</div>
      <div id="upgradeList"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>© DVC Clicker · inspired by Cookie Clicker</span>
    <div>
      <button class="reset-btn" id="resetBtn">⟳ Reset</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  /* ================================================================
     DVC CLICKER — FULL COOKIE CLICKER REMAKE
     ================================================================ */

  // ─── STATE ───
  const state = {
    cookies: 0,
    totalClicks: 0,
    cps: 0,
    upgrades: {}
  };

  // ─── UPGRADE DEFINITIONS ───
  const UPGRADES = [
    { id: 'cursor',   name: '🖱️ Cursor',        desc: 'Auto-click every second',          baseCost: 15,   cps: 0.2,  multiplier: 1.15,  max: 100 },
    { id: 'grandma',  name: '👵 Grandma',       desc: 'Bakes cookies with love',          baseCost: 100,  cps: 1,    multiplier: 1.15,  max: 80 },
    { id: 'farm',     name: '🌾 Farm',          desc: 'Harvest fresh cookies',           baseCost: 500,  cps: 4,    multiplier: 1.14,  max: 60 },
    { id: 'mine',     name: '⛏️ Mine',          desc: 'Dig up cookie ore',               baseCost: 3000, cps: 12,   multiplier: 1.13,  max: 50 },
    { id: 'factory',  name: '🏭 Factory',       desc: 'Mass-produce cookies',            baseCost: 15000,cps: 40,   multiplier: 1.12,  max: 40 },
    { id: 'portal',   name: '🌀 Portal',        desc: 'Summon cookies from elsewhere',   baseCost: 80000,cps: 150,  multiplier: 1.10,  max: 30 },
    { id: 'time',     name: '⏳ Time Machine',  desc: 'Bake cookies from the future',    baseCost: 400000,cps: 500, multiplier: 1.08,  max: 20 },
    { id: 'antimatter',name: '⚛️ Antimatter',   desc: 'Annihilate into cookies',         baseCost: 2000000,cps: 2000, multiplier: 1.07, max: 15 },
    { id: 'universe', name: '🌌 Universe',      desc: 'Create a cookie universe',        baseCost: 10000000,cps: 8000, multiplier: 1.06, max: 10 },
  ];

  // ─── HELPERS ───
  function getCost(upgrade) {
    const owned = state.upgrades[upgrade.id] || 0;
    if (owned >= upgrade.max) return Infinity;
    return Math.floor(upgrade.baseCost * Math.pow(upgrade.multiplier, owned));
  }

  function getTotalCPS() {
    let total = 0;
    for (const u of UPGRADES) {
      const owned = state.upgrades[u.id] || 0;
      total += owned * u.cps;
    }
    return total;
  }

  function formatNumber(n) {
    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return Math.floor(n).toString();
  }

  // ─── UI UPDATE ───
  function updateUI() {
    const countEl = document.getElementById('cookieCount');
    countEl.textContent = formatNumber(state.cookies);
    countEl.classList.remove('pop');
    void countEl.offsetWidth;
    countEl.classList.add('pop');

    document.getElementById('cpsDisplay').textContent = getTotalCPS().toFixed(1);
    document.getElementById('cpsLabel').textContent = getTotalCPS().toFixed(1) + ' / sec';
    document.getElementById('totalClicksDisplay').textContent = state.totalClicks;

    renderUpgrades();
  }

  function renderUpgrades() {
    const list = document.getElementById('upgradeList');
    list.innerHTML = '';
    for (const u of UPGRADES) {
      const owned = state.upgrades[u.id] || 0;
      const cost = getCost(u);
      const canAfford = state.cookies >= cost && owned < u.max;
      const div = document.createElement('div');
      div.className = 'upgrade-item' + (canAfford ? ' available' : '');
      div.innerHTML = `
        <div class="info">
          <span class="name">${u.name} <span class="owned">${owned}</span></span>
          <span class="desc">${u.desc}</span>
        </div>
        <div class="price">${cost === Infinity ? 'MAX' : '🍪 ' + formatNumber(cost)}</div>
      `;
      if (canAfford) {
        div.addEventListener('click', () => purchaseUpgrade(u.id));
      }
      list.appendChild(div);
    }
  }

  // ─── PURCHASE ───
  function purchaseUpgrade(id) {
    const u = UPGRADES.find(x => x.id === id);
    if (!u) return;
    const cost = getCost(u);
    if (state.cookies < cost) return;
    state.cookies -= cost;
    state.upgrades[id] = (state.upgrades[id] || 0) + 1;
    updateUI();
    showToast(`Purchased ${u.name}!`);
    saveGame();
  }

  // ─── CLICK ───
  function handleClick(e) {
    const clicker = document.getElementById('clicker');
    // ripple
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    clicker.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);

    // particle
    const rect = clicker.getBoundingClientRect();
    const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width/2) - rect.left;
    const y = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height/2) - rect.top;
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.textContent = '+1';
    const angle = Math.random() * 2 * Math.PI;
    const dist = 40 + Math.random() * 60;
    particle.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    particle.style.setProperty('--ty', Math.sin(angle) * dist - 40 + 'px');
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    clicker.appendChild(particle);
    setTimeout(() => particle.remove(), 900);

    // add cookies
    const gain = 1 + (state.upgrades['cursor'] || 0) * 0.1; // cursor boosts click
    state.cookies += gain;
    state.totalClicks++;
    updateUI();
    saveGame();
  }

  // ─── AUTO SAVE / LOAD ───
  function saveGame() {
    try {
      localStorage.setItem('dvcClickerSave', JSON.stringify({
        cookies: state.cookies,
        totalClicks: state.totalClicks,
        upgrades: state.upgrades
      }));
    } catch(e) {}
  }

  function loadGame() {
    try {
      const raw = localStorage.getItem('dvcClickerSave');
      if (!raw) return false;
      const data = JSON.parse(raw);
      state.cookies = data.cookies || 0;
      state.totalClicks = data.totalClicks || 0;
      state.upgrades = data.upgrades || {};
      return true;
    } catch(e) { return false; }
  }

  function resetGame() {
    if (confirm('Reset all progress?')) {
      state.cookies = 0;
      state.totalClicks = 0;
      state.upgrades = {};
      localStorage.removeItem('dvcClickerSave');
      updateUI();
      showToast('Game reset.');
    }
  }

  // ─── TOAST ───
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._hide);
    t._hide = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ─── GAME LOOP ───
  let lastTick = 0;
  function gameLoop(timestamp) {
    if (!lastTick) lastTick = timestamp;
    const delta = (timestamp - lastTick) / 1000;
    if (delta >= 0.1) {
      const cps = getTotalCPS();
      if (cps > 0) {
        state.cookies += cps * delta;
        updateUI();
        saveGame();
      }
      lastTick = timestamp;
    }
    requestAnimationFrame(gameLoop);
  }

  // ─── INIT ───
  function init() {
    const loaded = loadGame();
    // ensure all upgrades exist
    for (const u of UPGRADES) {
      if (!(u.id in state.upgrades)) state.upgrades[u.id] = 0;
    }
    updateUI();
    if (!loaded) {
      showToast('Welcome to DVC Clicker! Click the logo to start.');
    }

    // clicker events
    const clicker = document.getElementById('clicker');
    clicker.addEventListener('click', handleClick);
    clicker.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handleClick(e);
    }, { passive: false });

    document.getElementById('resetBtn').addEventListener('click', resetGame);

    // start loop
    requestAnimationFrame(gameLoop);
  }

  // ─── RUN ───
  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
